<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eDS-Checkpoint Report</title>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ดึง URL parameters จากหน้า Form.html
            const urlParams = new URLSearchParams(window.location.search);
            const rowId = urlParams.get('rowId');
            const spreadsheetId = urlParams.get('spreadsheetId');
            const sheetName = urlParams.get('sheetName');

            // สร้าง URL สำหรับ Google Apps Script โดยแนบ parameters เข้าไปด้วย
            let googleScriptUrl = "https://script.google.com/macros/s/AKfycbzbUP3dX0bG12EZM13T2k2XqDjtjNB1GUkaQMtxLZJG4TmgRVH_MAenGWdcU-nkMXQl/exec";
            
            const paramsToPass = [];
            if (rowId) paramsToPass.push(`rowId=${rowId}`);
            if (spreadsheetId) paramsToPass.push(`spreadsheetId=${spreadsheetId}`);
            if (sheetName) paramsToPass.push(`sheetName=${sheetName}`);

            if (paramsToPass.length > 0) {
                googleScriptUrl += "?" + paramsToPass.join("&");
            }

            // แทนที่การใช้ iframe ด้วยการเปลี่ยนหน้า (Redirect) ไปยัง URL นั้นทันที
            window.location.href = googleScriptUrl;
        });
    </script>
</head>
<body>
    <p style="text-align: center; margin-top: 20px;">กำลังนำคุณไปยังระบบ Report...</p>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Time Attendance</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Sarabun', Arial, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
}

.page-wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.fv-panel {
    background: white;
    border-bottom: 3px solid #56ab2f;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.fv-title {
    font-weight: 700;
    color: #166534;
    font-size: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.fv-status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    transition: all 0.3s;
}

.fv-status-bar.idle    { background:#f1f5f9; color:#64748b; border:1px solid #cbd5e1; }
.fv-status-bar.ready   { background:#dcfce7; color:#166534; border:1px solid #86efac; }
.fv-status-bar.error   { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
.fv-status-bar.loading { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }

.fv-camera-area {
    display: none;
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    width: 100%;
    aspect-ratio: 4/3;
    max-height: 260px;
    margin-bottom: 10px;
}
.fv-camera-area.active { display: block; }

#fvVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
}

.fv-face-guide {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px;
    border: 3px dashed rgba(134,239,172,0.85);
    border-radius: 50%;
    pointer-events: none;
    animation: fv-pulse 1.8s ease-in-out infinite;
}

@keyframes fv-pulse {
    0%,100% { border-color: rgba(134,239,172,0.85); }
    50%      { border-color: rgba(74,222,128,1); box-shadow: 0 0 0 8px rgba(134,239,172,0); }
}

/* ── Liveness Detection Overlay ── */
.fv-liveness-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 14px;
    pointer-events: none;
    z-index: 10;
}
.fv-liveness-challenge {
    background: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 20px;
    text-align: center;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
    transition: background 0.3s;
}
.fv-liveness-challenge.success { background: rgba(22,163,74,0.9); }
.fv-liveness-challenge.fail    { background: rgba(220,38,38,0.9); }
.fv-liveness-timer-bar {
    width: 80%;
    height: 5px;
    background: rgba(255,255,255,0.25);
    border-radius: 4px;
    overflow: hidden;
}
.fv-liveness-timer-fill {
    height: 100%;
    width: 100%;
    background: #4ade80;
    border-radius: 4px;
    transition: width linear, background 0.3s;
}
.fv-face-guide.liveness-ok {
    border-color: rgba(74,222,128,1) !important;
    box-shadow: 0 0 0 6px rgba(74,222,128,0.3);
    animation: none;
}
.fv-face-guide.liveness-fail {
    border-color: rgba(239,68,68,1) !important;
    animation: none;
}
@keyframes fv-liveness-success-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.7); }
    100% { box-shadow: 0 0 0 20px rgba(74,222,128,0); }
}

.fv-preview-area {
    display: none;
    margin-bottom: 10px;
}
.fv-preview-area.active { display: block; }

.fv-compact-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: #dcfce7;
    border: 1px solid #86efac;
    border-radius: 10px;
    padding: 12px;
}

.fv-thumb-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #16a34a;
}

.fv-thumb-stamp {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    text-align: center;
    padding: 2px 4px;
    white-space: nowrap;
    overflow: hidden;
    z-index: 2;
}

#fvCanvas {
    width: 80px;
    height: 80px;
    display: block;
    object-fit: cover;
}

.fv-compact-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.fv-compact-status {
    font-size: 13px;
    font-weight: 700;
    color: #166534;
    text-align: center;
}

.fv-compact-retake {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.fv-preview-badge { display: none; }

.fv-btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.fv-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.fv-btn:disabled { opacity:0.4; cursor:not-allowed; }
.fv-btn-open    { background: linear-gradient(135deg,#16a34a,#22c55e); color:#fff; }
.fv-btn-capture { background: linear-gradient(135deg,#0ea5e9,#38bdf8); color:#fff; }
.fv-btn-retake  { background: #f1f5f9; color:#475569; border:1px solid #cbd5e1; }

.fv-no-upload-notice {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 8px;
    text-align: center;
}

.iframe-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
}

iframe {
    border: none;
    width: 100%;
    flex: 1;
    min-height: calc(100vh - 280px);
    display: block;
}

.iframe-block-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
}

.iframe-block-overlay p {
    color: white;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 0 20px;
}

/* ── Loading spinner สำหรับ iframe ── */
.iframe-loading-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.85);
    z-index: 998;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
}
.iframe-loading-overlay.active { display: flex; }
.iframe-loading-spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2e8f0;
    border-top-color: #16a34a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.iframe-loading-text {
    font-size: 14px;
    font-weight: 600;
    color: #475569;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast แจ้งเตือน "พร้อมกรอกข้อมูล" ── */
.fv-ready-toast {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(22,163,74,0.45);
    transform: translateY(-100%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    text-align: center;
}
.fv-ready-toast.show { transform: translateY(0); }

/* ── pulse ring รอบ preview thumbnail ── */
.fv-thumb-wrap.pulse-ring {
    animation: thumbPulse 0.6s ease-out 3;
}
@keyframes thumbPulse {
    0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.7); }
    70%  { box-shadow: 0 0 0 10px rgba(22,163,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
}
</style>
</head>
<body>
<div class="page-wrapper">

    <!-- ✅ Toast แจ้งเตือนเมื่อฟอร์มพร้อมกรอก -->
    <div class="fv-ready-toast" id="fvReadyToast">
        ✅ ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย!
    </div>

    <!-- Face Verify Panel -->
    <div class="fv-panel" id="fvPanel">
        <div class="fv-title">📷 ยืนยันตัวตนด้วยใบหน้า <span style="color:#e74c3c">*</span></div>

        <div class="fv-status-bar idle" id="fvStatusBar">
            <span id="fvStatusIcon">🎥</span>
            <span id="fvStatusText">กดปุ่มเพื่อเปิดกล้องและถ่ายภาพยืนยัน</span>
        </div>

        <div class="fv-camera-area" id="fvCameraArea">
            <video id="fvVideo" autoplay playsinline muted></video>
            <div class="fv-face-guide" id="fvFaceGuide"></div>
            <!-- Liveness Detection Overlay -->
            <div class="fv-liveness-overlay" id="fvLivenessOverlay" style="display:none;">
                <div class="fv-liveness-challenge" id="fvLivenessChallenge">กรุณารอ...</div>
                <div class="fv-liveness-timer-bar">
                    <div class="fv-liveness-timer-fill" id="fvLivenessTimerFill"></div>
                </div>
            </div>
        </div>

        <div class="fv-preview-area" id="fvPreviewArea">
            <div class="fv-compact-row">
                <div class="fv-thumb-wrap">
                    <div class="fv-thumb-stamp" id="fvPreviewBadge"></div>
                    <canvas id="fvCanvas"></canvas>
                </div>
                <div class="fv-compact-info">
                    <div class="fv-compact-status" id="fvCompactStatus">⏳ กำลังระบุตำแหน่ง...</div>
                    <button class="fv-compact-retake" id="fvBtnRetake2">🔄 ถ่ายใหม่</button>
                </div>
            </div>
        </div>

        <div class="fv-btn-row">
            <button class="fv-btn fv-btn-open"    id="fvBtnOpen">🎥 เปิดกล้อง</button>
            <button class="fv-btn fv-btn-capture" id="fvBtnCapture" disabled>📸 ถ่ายภาพ</button>
            <button class="fv-btn fv-btn-retake"  id="fvBtnRetake" style="display:none">🔄 ถ่ายใหม่</button>
        </div>
        <div class="fv-no-upload-notice">🚫 ระบบไม่อนุญาตให้ Upload รูปภาพ — ถ่ายสดเท่านั้น</div>
    </div>

    <!-- iframe GAS -->
    <div class="iframe-wrapper">
        <div class="iframe-block-overlay" id="iframeBlockOverlay">
            <p>📷 กรุณายืนยันตัวตนด้วยใบหน้าก่อน</p>
            <p style="font-size:13px; font-weight:400;">กดปุ่ม "เปิดกล้อง" ด้านบน แล้วถ่ายภาพ</p>
        </div>
        <!-- Loading overlay แสดงระหว่างส่งรูป — ไม่ต้อง reload iframe อีกต่อไป -->
        <div class="iframe-loading-overlay" id="iframeLoadingOverlay">
            <div class="iframe-loading-spinner"></div>
            <div class="iframe-loading-text" id="iframeLoadingText">⏳ กำลังบันทึกภาพ...</div>
        </div>
        <iframe
            id="app"
            allow="geolocation"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</div>

<script>

/* ══════════════════════════════════════
   State
   ══════════════════════════════════════ */
var fvGasBaseUrl  = '';
var fvStream      = null;
var fvVerified    = false;
var fvDataUrl     = '';

/* ══════════════════════════════════════
   GPS: preload ทันทีที่ page load
   เพื่อให้ Chrome Android แสดง permission
   popup บน parent page ก่อน iframe โหลด
   ══════════════════════════════════════ */
var fvCachedLat = '';
var fvCachedLng = '';
var fvGpsReady  = false;

function fvPreloadGps() {
    if (!navigator.geolocation) {
        console.warn('Geolocation ไม่รองรับ');
        fvGpsReady = true;
        return;
    }
    console.log('GPS: pre-loading...');
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            fvCachedLat = pos.coords.latitude.toFixed(6);
            fvCachedLng = pos.coords.longitude.toFixed(6);
            fvGpsReady  = true;
            console.log('GPS cached:', fvCachedLat, fvCachedLng, '+-' + Math.round(pos.coords.accuracy) + 'm');
        },
        function(err) {
            fvGpsReady = true;
            console.warn('GPS preload error code:', err.code, err.message);
        },
        { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 }
    );
}

/* ══════════════════════════════════════
   DOMContentLoaded: GPS preload + iframe
   ══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {

    // 1) ขอ GPS ก่อน iframe โหลด
    fvPreloadGps();

    // 2) โหลด iframe
    var params = new URLSearchParams(window.location.search);
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxQktYn2Z5V_TQT_Kc_Ui9U6LoekMUaWBmwGmesS2T-_OgbOWG-wahxZZPwoR-aZ5Gr/exec';

    var query         = [];
    var page          = params.get('page');
    var empCode       = params.get('empCode');
    var spreadsheetId = params.get('spreadsheetId');
    var sheetName     = params.get('sheetName');

    if (page)          query.push('page='          + encodeURIComponent(page));
    if (empCode)       query.push('empCode='       + encodeURIComponent(empCode));
    if (spreadsheetId) query.push('spreadsheetId=' + encodeURIComponent(spreadsheetId));
    if (sheetName)     query.push('sheetName='     + encodeURIComponent(sheetName));

    var finalUrl = GAS_URL + (query.length ? '?' + query.join('&') : '');
    console.log('Load GAS:', finalUrl);
    document.getElementById('app').src = finalUrl;
    fvGasBaseUrl = finalUrl;

    fvUpdateOverlay();
});

/* ══════════════════════════════════════
   UI Helpers
   ══════════════════════════════════════ */
function fvSetStatus(type, icon, text) {
    var bar = document.getElementById('fvStatusBar');
    bar.className = 'fv-status-bar ' + type;
    document.getElementById('fvStatusIcon').textContent = icon;
    document.getElementById('fvStatusText').textContent = text;
}

function fvStopStream() {
    if (fvStream) {
        fvStream.getTracks().forEach(function(t) { t.stop(); });
        fvStream = null;
    }
}

function fvUpdateOverlay() {
    var overlay = document.getElementById('iframeBlockOverlay');
    if (!overlay) return;
    overlay.style.display = fvVerified ? 'none' : 'flex';
}

function fvShowIframeLoading(msg) {
    var overlay = document.getElementById('iframeLoadingOverlay');
    var text    = document.getElementById('iframeLoadingText');
    if (overlay) overlay.classList.add('active');
    if (text && msg) text.textContent = msg;
}

function fvHideIframeLoading() {
    var overlay = document.getElementById('iframeLoadingOverlay');
    if (overlay) overlay.classList.remove('active');
}

/* ══════════════════════════════════════
   เปิดกล้อง
   ══════════════════════════════════════ */
function fvOpenCamera() {
    // ── ✅ Reset Liveness state ทุกครั้งที่เปิดกล้องใหม่ ──
    _lvActive      = false;
    _lvPassed      = false;
    _lvChallenge   = '';
    _lvBlinkFrames = 0;
    _lvMouthFrames = 0;
    _lvSmileFrames = 0;
    _lvActionCount = 0;
    _lvInAction    = false;
    clearInterval(_lvDetectLoop);
    clearTimeout(_lvTimerRaf);
    var _ov = document.getElementById('fvLivenessOverlay');
    var _fg = document.getElementById('fvFaceGuide');
    var _ch = document.getElementById('fvLivenessChallenge');
    var _tf = document.getElementById('fvLivenessTimerFill');
    if (_ov) _ov.style.display = 'none';
    if (_fg) _fg.className = 'fv-face-guide';
    if (_ch) { _ch.textContent = ''; _ch.className = 'fv-liveness-challenge'; }
    if (_tf) { _tf.style.transition = 'none'; _tf.style.width = '100%'; _tf.style.background = '#4ade80'; }

    fvSetStatus('loading', '⏳', 'กำลังเปิดกล้อง...');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        fvSetStatus('error', '❌', 'Browser ไม่รองรับกล้อง กรุณาใช้ Chrome/Safari');
        return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(stream) {
            fvStream = stream;
            var video = document.getElementById('fvVideo');
            video.srcObject = stream;
            document.getElementById('fvCameraArea').classList.add('active');
            document.getElementById('fvPreviewArea').classList.remove('active');
            document.getElementById('fvBtnOpen').disabled    = true;
            document.getElementById('fvBtnCapture').disabled = false;
            document.getElementById('fvBtnRetake').style.display = 'none';
            fvSetStatus('loading', '📷', 'กล้องพร้อมแล้ว — จัดหน้าให้อยู่ในวงกลม แล้วกด "ถ่ายภาพ"');
            fvVerified = false;
            fvDataUrl  = '';
        })
        .catch(function(err) {
            console.error('Camera error:', err.name, err.message);
            var msg;
            if (err.name === 'NotAllowedError') {
                msg = 'ไม่ได้รับอนุญาตใช้กล้อง — กรุณากด Allow ที่ popup หรือใน Site Settings';
            } else if (err.name === 'NotFoundError') {
                msg = 'ไม่พบกล้องในอุปกรณ์นี้ — กรุณาใช้มือถือหรือเชื่อมต่อ Webcam';
            } else if (err.name === 'NotReadableError') {
                msg = 'กล้องถูกใช้งานโดย app อื่นอยู่ — กรุณาปิด app อื่นก่อน';
            } else if (err.name === 'OverconstrainedError') {
                fvSetStatus('loading', '⏳', 'กำลังลองเปิดกล้องแบบสำรอง...');
                // ✅ Performance: reuse success handler แทนการ duplicate code
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(function(stream) {
                        fvStream = stream;
                        document.getElementById('fvVideo').srcObject = stream;
                        document.getElementById('fvCameraArea').classList.add('active');
                        document.getElementById('fvPreviewArea').classList.remove('active');
                        document.getElementById('fvBtnOpen').disabled    = true;
                        document.getElementById('fvBtnCapture').disabled = false;
                        document.getElementById('fvBtnRetake').style.display = 'none';
                        fvSetStatus('loading', '📷', 'กล้องพร้อมแล้ว — จัดหน้าให้อยู่ในวงกลม แล้วกด "ถ่ายภาพ"');
                        fvVerified = false;
                    })
                    .catch(function(err2) {
                        fvSetStatus('error', '❌', 'ไม่สามารถเปิดกล้องได้: ' + err2.message);
                        document.getElementById('fvBtnOpen').disabled = false;
                    });
                return;
            } else {
                msg = 'ไม่สามารถเปิดกล้องได้: ' + err.name + ' — ' + err.message;
            }
            fvSetStatus('error', '❌', msg);
            document.getElementById('fvBtnOpen').disabled = false;
        });
}

/* ══════════════════════════════════════
   วาดแถบ GPS + Address ด้านล่างรูป
   ══════════════════════════════════════ */
function fvDrawGpsBar(canvas, ctx, fontSize, padding, barH, lat, lng, address) {
    var lineH  = barH;
    var totalH = lineH * 2;
    var barTop = canvas.height - totalH;
    var maxW   = canvas.width - padding * 2;

    ctx.fillStyle = 'rgba(0,70,0,0.68)';
    ctx.fillRect(0, barTop, canvas.width, totalH);

    ctx.font         = 'bold ' + fontSize + 'px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textBaseline = 'middle';

    var coordText = (lat && lng)
        ? '\uD83D\uDCCD ' + lat + ', ' + lng
        : '\uD83D\uDCCD GPS: ไม่สามารถระบุตำแหน่งได้';
    ctx.fillText(coordText, padding, barTop + lineH / 2, maxW);

    var addrText = address ? address : '';
    if (addrText) {
        ctx.font = fontSize + 'px sans-serif';
        // ✅ Performance: ใช้ binary search แทน O(n²) slice loop
        if (ctx.measureText(addrText).width > maxW) {
            var lo = 0, hi = addrText.length;
            while (lo < hi - 1) {
                var mid = Math.floor((lo + hi) / 2);
                if (ctx.measureText(addrText.slice(0, mid) + '...').width <= maxW) {
                    lo = mid;
                } else {
                    hi = mid;
                }
            }
            addrText = addrText.slice(0, lo) + '...';
        }
        ctx.fillStyle = '#d1fae5';
        ctx.fillText(addrText, padding, barTop + lineH + lineH / 2, maxW);
    }
}

/* ══════════════════════════════════════
   Cache รูปไป GAS แล้วส่ง fvKey ผ่าน
   postMessage (ไม่ reload iframe อีกต่อไป)
   — retry 3 ครั้ง backoff 2s/4s/8s
   ══════════════════════════════════════ */
function fvDoCache(retryCount) {
    retryCount = retryCount || 0;
    var MAX_RETRY    = 3;
    // ✅ Fix: ใช้ fvGasBaseUrl แทน hardcode URL เพื่อป้องกัน URL mismatch
    var GAS_EXEC_URL = fvGasBaseUrl
        ? fvGasBaseUrl.replace(/[?&]fvKey=[^&]*/g, '').replace(/&&/g, '&').replace(/[?&]$/, '')
        : 'https://script.google.com/macros/s/AKfycbxQktYn2Z5V_TQT_Kc_Ui9U6LoekMUaWBmwGmesS2T-_OgbOWG-wahxZZPwoR-aZ5Gr/exec';

    // Guard: ถ้า fvDataUrl ว่าง อย่าส่ง
    if (!fvDataUrl || fvDataUrl.length < 100) {
        console.error('fvDataUrl ว่าง — ยกเลิก cache');
        fvHideIframeLoading();
        fvSetStatus('error', '❌', 'เกิดข้อผิดพลาด: ไม่มีข้อมูลภาพ กรุณาถ่ายใหม่');
        var cs0 = document.getElementById('fvCompactStatus');
        if (cs0) cs0.textContent = '❌ ไม่มีภาพ กรุณาถ่ายใหม่';
        return;
    }

    var attempt = retryCount + 1;
    console.log('Cache attempt ' + attempt + '/' + MAX_RETRY + ' size:', Math.round(fvDataUrl.length/1024), 'KB');

    if (retryCount === 0) {
        fvShowIframeLoading('⏳ กำลังบันทึกภาพ... (' + attempt + '/' + MAX_RETRY + ')');
    } else {
        fvShowIframeLoading('⏳ กำลังลองใหม่ครั้งที่ ' + attempt + '...');
    }

    fetch(GAS_EXEC_URL, {
        method  : 'POST',
        body    : JSON.stringify({ action: 'cacheFaceUrl', imageData: fvDataUrl }),
        redirect: 'follow'
    })
    .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
    })
    .then(function(text) {
        console.log('Cache response:', text);
        var result;
        try { result = JSON.parse(text); } catch(e) { throw new Error('Parse error: ' + text.slice(0, 80)); }

        if (result.status === 'success' && result.cacheKey) {
            console.log('Cache key:', result.cacheKey);

            // ── ✅ ใช้ iframe reload + URL param (postMessage ถูก GAS Warden บล็อก) ──
            // ── แต่ตอนนี้รอ onload จริงๆ ก่อนซ่อน overlay (แก้ปัญหา refresh 2 รอบ) ──
            var iframeEl = document.getElementById('app');
            // ✅ Fix: ใช้ GAS_EXEC_URL ที่คำนวณไว้ด้านบนแล้ว ไม่ต้อง compute ซ้ำ
            var baseUrl  = GAS_EXEC_URL;
            var sep = baseUrl.indexOf('?') >= 0 ? '&' : '?';

            // อัปเดต overlay แสดงว่า "กำลังโหลดแบบฟอร์ม" (ยังไม่ซ่อน)
            fvShowIframeLoading('⏳ กำลังโหลดแบบฟอร์ม... รอสักครู่');
            var csLoading = document.getElementById('fvCompactStatus');
            if (csLoading) csLoading.textContent = '⏳ กำลังโหลดแบบฟอร์ม...';
            fvSetStatus('loading', '⏳', 'ภาพบันทึกแล้ว — กำลังโหลดแบบฟอร์ม รอสักครู่...');

            // ── Timeout 20 วิ: ถ้า onload ไม่ยิง (edge case) ให้ปลดล็อคเอง ──
            var iframeLoadTimer = setTimeout(function() {
                console.warn('⚠️ iframe load timeout — unlock form anyway');
                iframeEl.onload = null;
                fvHideIframeLoading();
                fvSetStatus('ready', '✅', 'ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย');
                var csT = document.getElementById('fvCompactStatus');
                if (csT) csT.textContent = '✅ ยืนยันตัวตนสำเร็จ';
                fvUpdateOverlay();
                fvShowReadyToast();
            }, 20000);

            // ── รอ iframe โหลดเสร็จจริงๆ แล้วค่อยซ่อน overlay ──
            iframeEl.onload = function() {
                clearTimeout(iframeLoadTimer);
                iframeEl.onload = null; // ล้าง listener ไม่ให้ยิงซ้ำ
                console.log('✅ iframe load complete — form ready');

                // ── ✅ ส่ง fvDataUrl (base64 รูปภาพ) ให้ iframe ผ่าน postMessage ──
                //    เพราะ GAS sandbox บล็อก window.parent cross-origin access
                if (fvDataUrl && fvDataUrl.length > 100) {
                    try {
                        iframeEl.contentWindow.postMessage(
                            { type: 'fvImageData', imageData: fvDataUrl },
                            '*'
                        );
                        console.log('📤 ส่ง fvImageData ผ่าน postMessage:', Math.round(fvDataUrl.length/1024), 'KB');
                    } catch(pmErr) {
                        console.warn('⚠️ postMessage fvImageData ไม่สำเร็จ:', pmErr.message);
                    }
                }

                fvHideIframeLoading();
                fvSetStatus('ready', '✅', 'ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย');
                var cs = document.getElementById('fvCompactStatus');
                if (cs) cs.textContent = '✅ ยืนยันตัวตนสำเร็จ';
                fvUpdateOverlay();
                fvShowReadyToast(); // แจ้งเตือน user ว่าพร้อมกรอกได้แล้ว
            };

            iframeEl.src = baseUrl + sep + 'fvKey=' + encodeURIComponent(result.cacheKey)
                         + '&fvTsBarH=' + encodeURIComponent(window._fvTsBarH  || 46)
                         + '&fvImgW='   + encodeURIComponent(window._fvCanvasW || 640)
                         + '&fvImgH='   + encodeURIComponent(window._fvCanvasH || 480);
            console.log('✅ iframe reload with fvKey:', result.cacheKey, 'tsBarH:', window._fvTsBarH, 'size:', window._fvCanvasW + 'x' + window._fvCanvasH);

        } else {
            throw new Error('GAS status: ' + (result.status || 'unknown'));
        }
    })
    .catch(function(err) {
        console.error('Cache error (attempt ' + attempt + '):', err.message || err);

        if (retryCount < MAX_RETRY - 1) {
            var delay = Math.pow(2, retryCount + 1) * 1000;
            console.log('Retry in ' + (delay/1000) + 's...');
            setTimeout(function() { fvDoCache(retryCount + 1); }, delay);
        } else {
            // หมด retry
            fvHideIframeLoading();
            console.error('Cache failed after ' + MAX_RETRY + ' attempts');
            fvSetStatus('error', '❌', 'บันทึกภาพไม่สำเร็จ กรุณากดถ่ายใหม่');
            var cs2 = document.getElementById('fvCompactStatus');
            if (cs2) cs2.textContent = '❌ บันทึกไม่สำเร็จ กรุณาถ่ายใหม่';
            // ไม่เรียก fvUpdateOverlay() — iframe ยังล็อคอยู่
        }
    });
}

/* ══════════════════════════════════════
   LIVENESS DETECTION
   ใช้ MediaPipe FaceMesh (CDN ฟรี)
   Challenge: สุ่ม 1 ใน 3 — กระพริบตา / อ้าปาก / ยิ้ม
   จำกัดเวลา 7 วินาที ต่อ challenge
   ══════════════════════════════════════ */
var _lvFaceMesh     = null;   // MediaPipe FaceMesh instance
var _lvLoaded       = false;  // โหลด model แล้ว
var _lvLoading      = false;  // กำลังโหลด
var _lvActive       = false;  // กำลัง detect อยู่
var _lvPassed       = false;  // ผ่าน challenge แล้ว
var _lvTimerRaf     = null;   // requestAnimationFrame timer
var _lvDetectLoop   = null;   // setInterval detect loop
var _lvChallenge    = '';     // action ที่สุ่มได้
var _lvTimeStart    = 0;      // เวลาเริ่ม challenge
var _lvTimeLimit    = 7000;   // 7 วินาที
var _lvBlinkFrames  = 0;      // frame นับ eye closed
var _lvMouthFrames  = 0;      // frame นับ mouth open
var _lvSmileFrames  = 0;      // frame นับ smile
var _lvActionCount  = 0;      // นับจำนวนครั้งที่ทำ action สำเร็จ
var _lvActionNeed   = 2;      // ต้องทำกี่ครั้งจึงผ่าน (ลดจาก 3 → 2)
var _lvInAction     = false;  // กำลังอยู่ใน action (ป้องกันนับซ้ำ)

// threshold ปรับได้
var LV_EAR_CLOSE    = 0.22;   // eye aspect ratio ต่ำกว่านี้ = หลับตา
var LV_MAR_OPEN     = 0.35;   // mouth aspect ratio สูงกว่านี้ = อ้าปาก
var LV_FRAMES_NEED  = 3;      // ต้องเห็น N frame ติดกัน

var LV_CHALLENGES   = ['blink', 'mouth'];  // ✅ ตัด smile ออก เหลือ 2 action
var LV_TEXTS        = {
    blink : '👁️ กระพริบตา 1 ครั้ง',
    mouth : '😮 อ้าปากค้างไว้'
};

/* โหลด MediaPipe FaceMesh */
function lvLoadModel(callback) {
    if (_lvLoaded) { callback(); return; }
    if (_lvLoading) { var wait = setInterval(function(){ if (_lvLoaded){ clearInterval(wait); callback(); } }, 200); return; }
    _lvLoading = true;
    fvSetStatus('loading', '⏳', 'กำลังโหลดระบบตรวจใบหน้า...');

    // โหลด script MediaPipe
    function loadScript(url, cb) {
        var s = document.createElement('script'); s.src = url; s.onload = cb;
        s.onerror = function(){ console.error('Script load fail:', url); cb(); };
        document.head.appendChild(s);
    }

    loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js', function(){
    loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js', function(){
        if (typeof FaceMesh === 'undefined') {
            console.warn('MediaPipe ไม่โหลด — ข้าม Liveness');
            _lvLoaded  = true;
            _lvLoading = false;
            callback();
            return;
        }
        _lvFaceMesh = new FaceMesh({ locateFile: function(f){
            return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/' + f;
        }});
        _lvFaceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
        _lvFaceMesh.onResults(lvOnResults);
        _lvFaceMesh.initialize().then(function(){
            _lvLoaded  = true;
            _lvLoading = false;
            console.log('✅ FaceMesh ready');
            callback();
        }).catch(function(e){
            console.warn('FaceMesh init fail:', e);
            _lvLoaded  = true;
            _lvLoading = false;
            callback();
        });
    });});
}

/* คำนวณ Eye Aspect Ratio (EAR) */
function lvEAR(lm, pts) {
    var p = function(i){ return lm[pts[i]]; };
    var dist = function(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); };
    return (dist(p(1),p(5)) + dist(p(2),p(4))) / (2 * dist(p(0),p(3)));
}

/* คำนวณ Mouth Aspect Ratio (MAR)
   ใช้ landmark ที่ถูกต้องสำหรับ MediaPipe FaceMesh 468 จุด
   บนริมฝีปาก: 13  ล่างริมฝีปาก: 14
   มุมปากซ้าย: 61  มุมปากขวา: 291
   จุดบนเพิ่มเติม: 82, 87  จุดล่างเพิ่มเติม: 312, 317 */
function lvMAR(lm) {
    var dist = function(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); };
    // แนวตั้ง 3 คู่ (เพิ่มความแม่นยำ)
    var v1 = dist(lm[82],  lm[87]);   // บนซ้าย → ล่างซ้าย
    var v2 = dist(lm[13],  lm[14]);   // กลาง บน → กลาง ล่าง
    var v3 = dist(lm[312], lm[317]);  // บนขวา → ล่างขวา
    // แนวนอน มุมปาก
    var h  = dist(lm[61],  lm[291]);
    return (v1 + v2 + v3) / (3 * h);
}

/* ตรวจ Smile โดยใช้ cheek lift — ไม่ใช้แล้ว (ตัดออก) */
// function lvIsSmile(lm) { ... }

/* รับผลจาก FaceMesh */
function lvOnResults(results) {
    if (!_lvActive || _lvPassed) return;
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

    var lm = results.multiFaceLandmarks[0];

    var earL = lvEAR(lm, [362,385,387,263,373,380]);
    var earR = lvEAR(lm, [33,160,158,133,153,144]);
    var ear  = (earL + earR) / 2;
    var mar  = lvMAR(lm);

    // ── Debug log (เปิดใน Console เพื่อดูค่าจริง) ──
    // console.log('EAR:', ear.toFixed(3), '| MAR:', mar.toFixed(3));

    var isDoingAction = false;

    if (_lvChallenge === 'blink') {
        isDoingAction = (ear < LV_EAR_CLOSE);
    } else if (_lvChallenge === 'mouth') {
        isDoingAction = (mar > LV_MAR_OPEN);
    }

    if (isDoingAction) {
        // สะสม frame ขณะทำ action
        if (_lvChallenge === 'blink')  _lvBlinkFrames++;
        if (_lvChallenge === 'mouth')  _lvMouthFrames++;

        var frames = (_lvChallenge === 'blink') ? _lvBlinkFrames : _lvMouthFrames;

        // ถึง threshold → นับ 1 ครั้ง
        if (frames >= LV_FRAMES_NEED && !_lvInAction) {
            _lvInAction    = true;  // ล็อกไม่ให้นับซ้ำในครั้งเดียวกัน
            _lvActionCount++;

            // reset frame counter รอรับ action ครั้งถัดไป
            _lvBlinkFrames = 0;
            _lvMouthFrames = 0;
            _lvSmileFrames = 0;

            // อัปเดต UI แสดงความคืบหน้า
            var ch = document.getElementById('fvLivenessChallenge');
            if (_lvActionCount >= _lvActionNeed) {
                // ครบ 3 ครั้ง → ผ่าน
                lvPass();
            } else {
                // ยังไม่ครบ → แสดงจำนวนที่ทำไปแล้ว
                if (ch) {
                    ch.textContent = LV_TEXTS[_lvChallenge] +
                        '  (' + _lvActionCount + '/' + _lvActionNeed + ')';
                }
                fvSetStatus('loading', '🔍',
                    'ทำแล้ว ' + _lvActionCount + '/' + _lvActionNeed + ' ครั้ง — ทำต่อเลย!');
            }
        }
    } else {
        // หน้ากลับสู่ท่าปกติ → ปลดล็อกให้นับครั้งถัดไปได้
        if (_lvInAction) {
            _lvInAction    = false;
            _lvBlinkFrames = 0;
            _lvMouthFrames = 0;
            _lvSmileFrames = 0;
        }
    }
}

/* ส่ง frame ให้ FaceMesh */
function lvSendFrame() {
    if (!_lvActive || !_lvFaceMesh || !_lvLoaded) return;
    var video = document.getElementById('fvVideo');
    if (video && video.readyState >= 2) {
        _lvFaceMesh.send({ image: video }).catch(function(){});
    }
}

/* เริ่ม Liveness Challenge */
function lvStart() {
    // สุ่ม challenge
    _lvChallenge   = LV_CHALLENGES[Math.floor(Math.random() * LV_CHALLENGES.length)];
    _lvActive      = true;
    _lvPassed      = false;
    _lvBlinkFrames = 0;
    _lvMouthFrames = 0;
    _lvSmileFrames = 0;
    _lvActionCount = 0;      // ✅ reset จำนวนครั้ง
    _lvInAction    = false;  // ✅ reset สถานะ action
    _lvTimeStart   = Date.now();

    // แสดง overlay
    var ov = document.getElementById('fvLivenessOverlay');
    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    if (ov) ov.style.display = 'flex';
    if (ch) {
        ch.textContent = LV_TEXTS[_lvChallenge] + '  (0/' + _lvActionNeed + ')';
        ch.className = 'fv-liveness-challenge';
    }
    if (tf) { tf.style.width = '100%'; tf.style.background = '#4ade80'; tf.style.transition = 'none'; }

    // ล็อกปุ่ม Capture ระหว่าง challenge
    document.getElementById('fvBtnCapture').disabled = true;

    fvSetStatus('loading', '🔍', LV_TEXTS[_lvChallenge] + ' ให้ครบ ' + _lvActionNeed + ' ครั้ง');

    // timer bar animation
    setTimeout(function(){
        if (tf) {
            tf.style.transition = 'width ' + (_lvTimeLimit/1000) + 's linear';
            tf.style.width = '0%';
        }
    }, 50);

    // detect loop 100ms
    _lvDetectLoop = setInterval(lvSendFrame, 100);

    // timeout
    _lvTimerRaf = setTimeout(function(){
        if (!_lvPassed) lvFail();
    }, _lvTimeLimit);
}

/* ผ่าน Challenge */
function lvPass() {
    if (_lvPassed) return;
    _lvPassed = true;
    _lvActive = false;
    clearInterval(_lvDetectLoop);
    clearTimeout(_lvTimerRaf);

    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    var fg = document.getElementById('fvFaceGuide');
    if (tf) { tf.style.width = '100%'; tf.style.background = '#4ade80'; }
    if (fg) fg.className = 'fv-face-guide liveness-ok';
    if (ch) { ch.textContent = '✅ ยืนยันตัวตนสำเร็จ!'; ch.className = 'fv-liveness-challenge success'; }

    fvSetStatus('loading', '✅', 'ผ่านการยืนยันตัวตน — กำลังบันทึก...');

    // ซ่อน overlay แล้วบันทึกภาพที่ถ่ายไว้แล้ว
    setTimeout(function(){
        var ov = document.getElementById('fvLivenessOverlay');
        if (ov) ov.style.display = 'none';
        if (fg) fg.className = 'fv-face-guide';
        fvCommitCapture();  // ✅ บันทึกภาพที่ capture ไว้ตอนกดปุ่ม
    }, 800);
}

/* ไม่ผ่าน Challenge — ลองใหม่ */
function lvFail() {
    _lvActive = false;
    clearInterval(_lvDetectLoop);
    clearTimeout(_lvTimerRaf);

    // ✅ ล้างภาพที่ถ่ายไว้ เพราะต้องเริ่มใหม่ทั้งหมด
    _fvPendingCanvas = null;
    _fvPendingCtx    = null;
    _fvPendingGpsFn  = null;
    fvVerified = false;
    document.getElementById('fvPreviewArea').classList.remove('active');
    document.getElementById('fvCameraArea').classList.add('active');

    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    var fg = document.getElementById('fvFaceGuide');
    if (ch) { ch.textContent = '⏱️ หมดเวลา — กรุณาลองใหม่'; ch.className = 'fv-liveness-challenge fail'; }
    if (tf) { tf.style.width = '0%'; tf.style.background = '#ef4444'; }
    if (fg) fg.className = 'fv-face-guide liveness-fail';

    fvSetStatus('error', '⚠️', 'หมดเวลา — กดปุ่ม "ถ่ายภาพ" เพื่อลองใหม่');
    document.getElementById('fvBtnCapture').disabled = false;

    setTimeout(function(){
        if (fg) fg.className = 'fv-face-guide';
        var ov = document.getElementById('fvLivenessOverlay');
        if (ov) ov.style.display = 'none';
        fvSetStatus('loading', '📷', 'กล้องพร้อม — กด "ถ่ายภาพ" เพื่อเริ่มใหม่');
    }, 1500);
}

/* Entry point: กดปุ่ม "ถ่ายภาพ" → Capture ก่อน → แล้วค่อย check Action */
function fvStartLiveness() {
    lvLoadModel(function(){
        if (!_lvLoaded || typeof FaceMesh === 'undefined') {
            // MediaPipe โหลดไม่ได้ → Capture แล้วบันทึกเลย
            console.warn('⚠️ Liveness ไม่พร้อม — Capture โดยไม่มี Liveness');
            fvSetStatus('loading', '📷', 'กล้องพร้อม — กำลังถ่ายภาพ...');
            fvCapture();
            return;
        }
        // ✅ Step 1: Capture หน้าตรงก่อนเลย (ผู้ใช้มองตรงอยู่แล้ว)
        fvSetStatus('loading', '📸', 'กำลังถ่ายภาพหน้าตรง...');
        fvCaptureOnly(function(){
            // ✅ Step 2: หลัง Capture แล้วค่อยเริ่ม Action challenge
            lvStart();
        });
    });
}

/* ══════════════════════════════════════
   ถ่ายภาพ + timestamp + GPS (cache ครั้งเดียว)
   fvCaptureOnly(callback) — ถ่ายภาพ+preview แต่ยังไม่บันทึก GAS
   fvCapture()             — ถ่ายภาพ+preview+บันทึก GAS ทันที (กรณี Liveness ไม่พร้อม)
   ══════════════════════════════════════ */

// ✅ เก็บ canvas/ctx ไว้ให้ lvPass() เรียกบันทึกได้ภายหลัง
var _fvPendingCanvas = null;
var _fvPendingCtx    = null;
var _fvPendingGpsFn  = null;  // function ที่จะ draw GPS + cache

function fvCaptureOnly(onCaptured) {
    // ถ่ายภาพ+แสดง preview แต่ยังไม่บันทึก — รอผ่าน Action ก่อน
    var video  = document.getElementById('fvVideo');
    var canvas = document.getElementById('fvCanvas');
    if (!video.videoWidth) {
        fvSetStatus('error', '⚠️', 'กล้องยังไม่พร้อม รอสักครู่แล้วลองใหม่');
        return;
    }

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    var ctx = canvas.getContext('2d');

    // วาดภาพ (mirror)
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    // Timestamp
    var now   = new Date();
    var pad   = function(n) { return n < 10 ? '0' + n : '' + n; };
    var stamp = pad(now.getDate()) + '/' +
                pad(now.getMonth() + 1) + '/' +
                now.getFullYear() + '  ' +
                pad(now.getHours()) + ':' +
                pad(now.getMinutes()) + ':' +
                pad(now.getSeconds());

    var gpsFontSize = Math.max(14, Math.round(canvas.width * 0.032));
    var gpsBarH     = gpsFontSize + Math.round(gpsFontSize * 0.5) * 2;
    var tsFontSize  = Math.max(18, Math.round(canvas.width * 0.048));
    var tsPadding   = Math.round(tsFontSize * 0.5);
    var tsBarH      = tsFontSize + tsPadding * 2;
    var gpsPadding  = Math.round(gpsFontSize * 0.5);

    window._fvTsBarH  = tsBarH;
    window._fvCanvasW = canvas.width;
    window._fvCanvasH = canvas.height;

    // แถบ Timestamp ด้านบน
    ctx.fillStyle    = 'rgba(0,0,0,0.30)';
    ctx.fillRect(0, 0, canvas.width, tsBarH);
    ctx.font         = tsFontSize + 'px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u23F1 ' + stamp, tsPadding, tsBarH / 2);

    // เก็บ canvas+ctx+gps function ไว้รอ lvPass()
    _fvPendingCanvas = canvas;
    _fvPendingCtx    = ctx;
    _fvPendingGpsFn  = function() {
        fvSetStatus('loading', '⏳', 'กำลังระบุตำแหน่ง GPS...');
        var cs = document.getElementById('fvCompactStatus');
        if (cs) cs.textContent = '⏳ กำลังระบุตำแหน่ง GPS...';

        function doDrawAndCache(useLat, useLng, addr) {
            fvDrawGpsBar(_fvPendingCanvas, _fvPendingCtx, gpsFontSize, gpsPadding, gpsBarH, useLat, useLng, addr || '');
            fvDataUrl = _fvPendingCanvas.toDataURL('image/jpeg', 0.82);
            console.log('Ready size:', Math.round(fvDataUrl.length/1024), 'KB',
                        useLat ? 'GPS:' + useLat : 'no GPS',
                        addr   ? 'addr:ok' : 'no addr');
            fvDoCache();
        }

        function fvFinalizeAndCache(lat, lng) {
            var useLat = (lat && lat !== '') ? lat : fvCachedLat;
            var useLng = (lng && lng !== '') ? lng : fvCachedLng;
            if (useLat && useLng) {
                var done  = false;
                var timer = setTimeout(function() {
                    if (done) return;
                    done = true;
                    doDrawAndCache(useLat, useLng, '');
                }, 4000);
                fvReverseGeocode(useLat, useLng, function(addr) {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    doDrawAndCache(useLat, useLng, addr);
                });
            } else {
                doDrawAndCache('', '', '');
            }
        }
        fvProceedWithCachedGps(fvFinalizeAndCache);
    };

    // แสดง preview ทันที (ยังไม่หยุดกล้อง — รอ action ก่อน)
    document.getElementById('fvPreviewArea').classList.add('active');
    document.getElementById('fvPreviewBadge').textContent = stamp;
    document.getElementById('fvBtnRetake').style.display = 'none';
    fvVerified = false;  // ยังไม่ผ่าน จนกว่าจะผ่าน Action

    if (onCaptured) onCaptured();
}

/* เรียกโดย lvPass() เมื่อผ่าน Action ครบ → บันทึกจริง */
function fvCommitCapture() {
    if (!_fvPendingGpsFn) return;
    fvStopStream();
    document.getElementById('fvCameraArea').classList.remove('active');
    document.getElementById('fvBtnCapture').disabled = true;
    document.getElementById('fvBtnOpen').disabled    = false;
    document.getElementById('fvBtnRetake').style.display = 'none';
    fvVerified = true;
    _fvPendingGpsFn();  // draw GPS + cache + บันทึก GAS
    _fvPendingGpsFn = null;
}

    // ── วาด GPS bar + cache ครั้งเดียว ──
    function doDrawAndCache(useLat, useLng, addr) {
        fvDrawGpsBar(canvas, ctx, gpsFontSize, gpsPadding, gpsBarH, useLat, useLng, addr || '');
        fvDataUrl = canvas.toDataURL('image/jpeg', 0.82);
        console.log('Ready size:', Math.round(fvDataUrl.length/1024), 'KB',
                    useLat ? 'GPS:' + useLat : 'no GPS',
                    addr   ? 'addr:ok' : 'no addr');
        fvDoCache();
    }

    function fvFinalizeAndCache(lat, lng) {
        // ใช้ cached GPS เสมอถ้า param ว่าง (race condition)
        var useLat = (lat && lat !== '') ? lat : fvCachedLat;
        var useLng = (lng && lng !== '') ? lng : fvCachedLng;

        if (useLat && useLng) {
            var done  = false;
            var timer = setTimeout(function() {
                if (done) return;
                done = true;
                console.warn('Nominatim timeout — cache without address');
                doDrawAndCache(useLat, useLng, '');
            }, 4000);

            fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + useLat + '&lon=' + useLng + '&accept-language=th',
                  { headers: { 'Accept-Language': 'th' } })
                .then(function(r) { return r.json(); })
                .then(function(geo) {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    doDrawAndCache(useLat, useLng, geo.display_name || '');
                })
                .catch(function() {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    doDrawAndCache(useLat, useLng, '');
                });
        } else {
            doDrawAndCache('', '', '');
        }
    }

    // ── ใช้ GPS cache หรือรอ preload ──
    function fvProceedWithCachedGps() {
        if (fvCachedLat && fvCachedLng) {
            fvFinalizeAndCache(fvCachedLat, fvCachedLng);
        } else if (!fvGpsReady) {
            // preload ยังไม่เสร็จ — poll รอ
            var waitGps = setInterval(function() {
                if (fvGpsReady) {
                    clearInterval(waitGps);
                    fvFinalizeAndCache(fvCachedLat, fvCachedLng);
                }
            }, 300);
            setTimeout(function() {
                clearInterval(waitGps);
                // ✅ Fix: mark fvGpsReady=true เพื่อป้องกัน interval ยิงหลัง timeout
                fvGpsReady = true;
                fvFinalizeAndCache('', '');
            }, 16000);
        } else {
            // GPS ไม่ได้เลย
            fvFinalizeAndCache('', '');
        }
    }

    fvProceedWithCachedGps();
}

/* ══════════════════════════════════════
   ถ่ายใหม่
   ══════════════════════════════════════ */
function fvRetake() {
    // ── ✅ Reset Liveness state ทั้งหมดก่อน ──
    _lvActive        = false;
    _lvPassed        = false;
    _lvChallenge     = '';
    _lvBlinkFrames   = 0;
    _lvMouthFrames   = 0;
    _lvSmileFrames   = 0;
    _lvActionCount   = 0;
    _lvInAction      = false;
    _fvPendingCanvas = null;
    _fvPendingCtx    = null;
    _fvPendingGpsFn  = null;
    clearInterval(_lvDetectLoop);
    clearTimeout(_lvTimerRaf);

    // ซ่อน Liveness overlay และ reset วงกลม guide
    var ov = document.getElementById('fvLivenessOverlay');
    var fg = document.getElementById('fvFaceGuide');
    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    if (ov) ov.style.display = 'none';
    if (fg) fg.className = 'fv-face-guide';
    if (ch) { ch.textContent = ''; ch.className = 'fv-liveness-challenge'; }
    if (tf) { tf.style.transition = 'none'; tf.style.width = '100%'; tf.style.background = '#4ade80'; }

    // ── Reset ข้อมูลภาพเดิม ──
    fvVerified = false;
    fvDataUrl  = '';
    fvHideIframeLoading();
    document.getElementById('fvPreviewArea').classList.remove('active');
    document.getElementById('fvBtnRetake').style.display = 'none';
    fvSetStatus('idle', '🎥', 'กดปุ่มเพื่อเปิดกล้องและถ่ายภาพยืนยัน');
    document.getElementById('fvBtnOpen').disabled    = false;
    document.getElementById('fvBtnCapture').disabled = true;
    fvUpdateOverlay();
}

/* ══════════════════════════════════════
   ให้ index.html (GAS) ดึง base64 ได้
   ══════════════════════════════════════ */
window.fvGetImageData = function() {
    console.log('fvGetImageData called — verified:', fvVerified,
                'size:', Math.round(fvDataUrl.length/1024), 'KB');
    return fvVerified ? fvDataUrl : '';
};

/* ══════════════════════════════════════
   Toast แจ้งเตือน "พร้อมกรอกข้อมูลได้แล้ว"
   — ปรากฏด้านบน 3 วินาที แล้วหายไปเอง
   ══════════════════════════════════════ */
function fvShowReadyToast() {
    var toast = document.getElementById('fvReadyToast');
    if (!toast) return;
    toast.classList.add('show');

    // pulse thumbnail
    var thumb = document.querySelector('.fv-thumb-wrap');
    if (thumb) {
        thumb.classList.remove('pulse-ring');
        // force reflow
        void thumb.offsetWidth;
        thumb.classList.add('pulse-ring');
    }

    setTimeout(function() {
        toast.classList.remove('show');
    }, 3500);
}

/* ── bind buttons ── */
document.getElementById('fvBtnOpen').addEventListener('click',    fvOpenCamera);
document.getElementById('fvBtnCapture').addEventListener('click', fvStartLiveness); // ✅ Liveness ก่อน Capture
document.getElementById('fvBtnRetake').addEventListener('click',  fvRetake);
document.getElementById('fvBtnRetake2').addEventListener('click', fvRetake);
window.addEventListener('beforeunload', fvStopStream);

</script>

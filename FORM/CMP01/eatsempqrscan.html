<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Time Attendance</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Sarabun', Arial, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
}

.page-wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.fv-panel {
    background: white;
    border-bottom: 3px solid #56ab2f;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.fv-title {
    font-weight: 700;
    color: #166534;
    font-size: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.fv-status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    transition: all 0.3s;
}

.fv-status-bar.idle    { background:#f1f5f9; color:#64748b; border:1px solid #cbd5e1; }
.fv-status-bar.ready   { background:#dcfce7; color:#166534; border:1px solid #86efac; }
.fv-status-bar.error   { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
.fv-status-bar.loading { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }

.fv-camera-area {
    display: none;
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    width: 100%;
    aspect-ratio: 4/3;
    max-height: 260px;
    margin-bottom: 10px;
}
.fv-camera-area.active { display: block; }

#fvVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
}

.fv-face-guide {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px;
    border: 3px dashed rgba(134,239,172,0.85);
    border-radius: 50%;
    pointer-events: none;
    animation: fv-pulse 1.8s ease-in-out infinite;
}

@keyframes fv-pulse {
    0%,100% { border-color: rgba(134,239,172,0.85); }
    50%      { border-color: rgba(74,222,128,1); box-shadow: 0 0 0 8px rgba(134,239,172,0); }
}

.fv-preview-area {
    display: none;
    margin-bottom: 10px;
}
.fv-preview-area.active { display: block; }

.fv-compact-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: #dcfce7;
    border: 1px solid #86efac;
    border-radius: 10px;
    padding: 12px;
}

.fv-thumb-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #16a34a;
}

.fv-thumb-stamp {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    text-align: center;
    padding: 2px 4px;
    white-space: nowrap;
    overflow: hidden;
    z-index: 2;
}

#fvCanvas {
    width: 80px;
    height: 80px;
    display: block;
    object-fit: cover;
}

.fv-compact-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.fv-compact-status {
    font-size: 13px;
    font-weight: 700;
    color: #166534;
    text-align: center;
}

.fv-compact-retake {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.fv-preview-badge { display: none; }

.fv-btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.fv-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.fv-btn:disabled { opacity:0.4; cursor:not-allowed; }
.fv-btn-open    { background: linear-gradient(135deg,#16a34a,#22c55e); color:#fff; }
.fv-btn-capture { background: linear-gradient(135deg,#0ea5e9,#38bdf8); color:#fff; }
.fv-btn-retake  { background: #f1f5f9; color:#475569; border:1px solid #cbd5e1; }

.fv-no-upload-notice {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 8px;
    text-align: center;
}

.iframe-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
}

iframe {
    border: none;
    width: 100%;
    flex: 1;
    min-height: calc(100vh - 280px);
    display: block;
}

.iframe-block-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
}

.iframe-block-overlay p {
    color: white;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 0 20px;
}
</style>
</head>
<body>
<div class="page-wrapper">

    <!-- 📷 Face Verify Panel -->
    <div class="fv-panel" id="fvPanel">
        <div class="fv-title">📷 ยืนยันตัวตนด้วยใบหน้า <span style="color:#e74c3c">*</span></div>

        <div class="fv-status-bar idle" id="fvStatusBar">
            <span id="fvStatusIcon">🎥</span>
            <span id="fvStatusText">กดปุ่มเพื่อเปิดกล้องและถ่ายภาพยืนยัน</span>
        </div>

        <div class="fv-camera-area" id="fvCameraArea">
            <video id="fvVideo" autoplay playsinline muted></video>
            <div class="fv-face-guide"></div>
        </div>

        <div class="fv-preview-area" id="fvPreviewArea">
            <div class="fv-compact-row">
                <div class="fv-thumb-wrap">
                    <div class="fv-thumb-stamp" id="fvPreviewBadge"></div>
                    <canvas id="fvCanvas"></canvas>
                </div>
                <div class="fv-compact-info">
                    <div class="fv-compact-status" id="fvCompactStatus">⏳ กำลังระบุตำแหน่ง...</div>
                    <button class="fv-compact-retake" id="fvBtnRetake2">🔄 ถ่ายใหม่</button>
                </div>
            </div>
        </div>

        <div class="fv-btn-row">
            <button class="fv-btn fv-btn-open"    id="fvBtnOpen">🎥 เปิดกล้อง</button>
            <button class="fv-btn fv-btn-capture" id="fvBtnCapture" disabled>📸 ถ่ายภาพ</button>
            <button class="fv-btn fv-btn-retake"  id="fvBtnRetake" style="display:none">🔄 ถ่ายใหม่</button>
        </div>
        <div class="fv-no-upload-notice">🚫 ระบบไม่อนุญาตให้ Upload รูปภาพ — ถ่ายสดเท่านั้น</div>
    </div>

    <!-- iframe GAS -->
    <div class="iframe-wrapper">
        <div class="iframe-block-overlay" id="iframeBlockOverlay">
            <p>📷 กรุณายืนยันตัวตนด้วยใบหน้าก่อน</p>
            <p style="font-size:13px; font-weight:400;">กดปุ่ม "เปิดกล้อง" ด้านบน แล้วถ่ายภาพ</p>
        </div>
        <iframe
            id="app"
            allow="geolocation"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</div>

<script>

/* ══════════════════════════════════════
   โหลด GAS iframe (ครั้งเดียวตอนเริ่ม)
   ══════════════════════════════════════ */
var fvGasBaseUrl = '';
document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxQktYn2Z5V_TQT_Kc_Ui9U6LoekMUaWBmwGmesS2T-_OgbOWG-wahxZZPwoR-aZ5Gr/exec';

    var query = [];
    var page          = params.get('page');
    var empCode       = params.get('empCode');
    var spreadsheetId = params.get('spreadsheetId');
    var sheetName     = params.get('sheetName');

    if (page)          query.push('page='          + encodeURIComponent(page));
    if (empCode)       query.push('empCode='       + encodeURIComponent(empCode));
    if (spreadsheetId) query.push('spreadsheetId=' + encodeURIComponent(spreadsheetId));
    if (sheetName)     query.push('sheetName='     + encodeURIComponent(sheetName));

    var finalUrl = GAS_URL + (query.length ? '?' + query.join('&') : '');
    console.log('Load GAS:', finalUrl);
    document.getElementById('app').src = finalUrl;
    fvGasBaseUrl = finalUrl;

    fvUpdateOverlay();
});

/* ══════════════════════════════════════
   📷 Face Verification — ตัวแปร global
   ══════════════════════════════════════ */
var fvStream   = null;
var fvVerified = false;
var fvDataUrl  = '';
window.fvCacheKey = '';

/* ── helper ── */
function fvSetStatus(type, icon, text) {
    var bar = document.getElementById('fvStatusBar');
    bar.className = 'fv-status-bar ' + type;
    document.getElementById('fvStatusIcon').textContent = icon;
    document.getElementById('fvStatusText').textContent = text;
}

function fvStopStream() {
    if (fvStream) {
        fvStream.getTracks().forEach(function(t) { t.stop(); });
        fvStream = null;
    }
}

function fvUpdateOverlay() {
    var overlay = document.getElementById('iframeBlockOverlay');
    if (!overlay) return;
    overlay.style.display = fvVerified ? 'none' : 'flex';
}

/* ── เปิดกล้อง ── */
function fvOpenCamera() {
    fvSetStatus('loading', '⏳', 'กำลังเปิดกล้อง...');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        fvSetStatus('error', '❌', 'Browser ไม่รองรับกล้อง กรุณาใช้ Chrome/Safari');
        return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(stream) {
            fvStream = stream;
            var video = document.getElementById('fvVideo');
            video.srcObject = stream;
            document.getElementById('fvCameraArea').classList.add('active');
            document.getElementById('fvPreviewArea').classList.remove('active');
            document.getElementById('fvBtnOpen').disabled    = true;
            document.getElementById('fvBtnCapture').disabled = false;
            document.getElementById('fvBtnRetake').style.display = 'none';
            fvSetStatus('loading', '📷', 'กล้องพร้อมแล้ว — จัดหน้าให้อยู่ในวงกลม แล้วกด "ถ่ายภาพ"');
            fvVerified = false;
            fvDataUrl  = '';
        })
        .catch(function(err) {
            console.error('Camera error:', err.name, err.message);
            var msg;
            if (err.name === 'NotAllowedError') {
                msg = 'ไม่ได้รับอนุญาตใช้กล้อง — กรุณากด Allow ที่ popup หรือใน Site Settings';
            } else if (err.name === 'NotFoundError') {
                msg = 'ไม่พบกล้องในอุปกรณ์นี้ — กรุณาใช้มือถือหรือเชื่อมต่อ Webcam';
            } else if (err.name === 'NotReadableError') {
                msg = 'กล้องถูกใช้งานโดย app อื่นอยู่ — กรุณาปิด app อื่นก่อน';
            } else if (err.name === 'OverconstrainedError') {
                fvSetStatus('loading', '⏳', 'กำลังลองเปิดกล้องแบบสำรอง...');
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(function(stream) {
                        fvStream = stream;
                        document.getElementById('fvVideo').srcObject = stream;
                        document.getElementById('fvCameraArea').classList.add('active');
                        document.getElementById('fvPreviewArea').classList.remove('active');
                        document.getElementById('fvBtnOpen').disabled    = true;
                        document.getElementById('fvBtnCapture').disabled = false;
                        document.getElementById('fvBtnRetake').style.display = 'none';
                        fvSetStatus('loading', '📷', 'กล้องพร้อมแล้ว — จัดหน้าให้อยู่ในวงกลม แล้วกด "ถ่ายภาพ"');
                        fvVerified = false;
                    })
                    .catch(function(err2) {
                        fvSetStatus('error', '❌', 'ไม่สามารถเปิดกล้องได้: ' + err2.message);
                        document.getElementById('fvBtnOpen').disabled = false;
                    });
                return;
            } else {
                msg = 'ไม่สามารถเปิดกล้องได้: ' + err.name + ' — ' + err.message;
            }
            fvSetStatus('error', '❌', msg);
            document.getElementById('fvBtnOpen').disabled = false;
        });
}

/* ══════════════════════════════════════
   วาดแถบ GPS coordinates ด้านล่างรูป
   (1 บรรทัด: พิกัดเท่านั้น — ไม่มี address)
   ══════════════════════════════════════ */
function fvDrawGpsBar(canvas, ctx, fontSize, padding, barH, lat, lng) {
    var barTop = canvas.height - barH;
    var maxW   = canvas.width - padding * 2;

    ctx.fillStyle = 'rgba(0,70,0,0.68)';
    ctx.fillRect(0, barTop, canvas.width, barH);

    ctx.font         = 'bold ' + fontSize + 'px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textBaseline = 'middle';

    var coordText = (lat && lng)
        ? '📍 ' + lat + ', ' + lng
        : '📍 GPS: ไม่สามารถระบุตำแหน่งได้';
    ctx.fillText(coordText, padding, barTop + barH / 2, maxW);
}

/* ══════════════════════════════════════
   Cache รูปไป GAS ใน background
   ❌ ไม่ reload iframe
   ══════════════════════════════════════ */
function fvDoCache() {
    var GAS_EXEC_URL = 'https://script.google.com/macros/s/AKfycbxQktYn2Z5V_TQT_Kc_Ui9U6LoekMUaWBmwGmesS2T-_OgbOWG-wahxZZPwoR-aZ5Gr/exec';

    // ✅ ปลด overlay ทันที — ให้กรอกข้อมูลได้เลย ไม่ต้องรอ cache
    fvVerified = true;
    fvSetStatus('ready', '✅', 'ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย');
    var cs = document.getElementById('fvCompactStatus');
    if (cs) cs.textContent = '✅ ยืนยันตัวตนสำเร็จ';
    fvUpdateOverlay();

    // ส่งรูปไป cache เงียบๆ ใน background
    fetch(GAS_EXEC_URL, {
        method  : 'POST',
        body    : JSON.stringify({
            action   : 'cacheFaceUrl',
            imageData: fvDataUrl
        }),
        redirect: 'follow'
    })
    .then(function(res) { return res.text(); })
    .then(function(text) {
        console.log('📦 Cache response:', text);
        try {
            var result = JSON.parse(text);
            if (result.status === 'success' && result.cacheKey) {
                window.fvCacheKey = result.cacheKey;
                console.log('✅ Cache key:', result.cacheKey);
            } else {
                console.warn('⚠️ Cache ไม่สำเร็จ:', text);
            }
        } catch(e) {
            console.error('Parse error:', e, text);
        }
    })
    .catch(function(err) {
        // ไม่แสดง error ให้ user — รูปยังอยู่ใน fvDataUrl
        console.error('❌ Cache background error:', err);
    });
}

/* ══════════════════════════════════════
   ถ่ายภาพ + timestamp + GPS coordinates
   ══════════════════════════════════════ */
function fvCapture() {
    var video  = document.getElementById('fvVideo');
    var canvas = document.getElementById('fvCanvas');
    if (!video.videoWidth) {
        fvSetStatus('error', '⚠️', 'กล้องยังไม่พร้อม รอสักครู่แล้วลองใหม่');
        return;
    }

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    var ctx = canvas.getContext('2d');

    // ── วาดภาพ (mirror) ──
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    // ── คำนวณขนาด font/bar ──
    var now      = new Date();
    var pad      = function(n) { return n < 10 ? '0' + n : '' + n; };
    var stamp    = pad(now.getDate()) + '/' +
                   pad(now.getMonth() + 1) + '/' +
                   now.getFullYear() + '  ' +
                   pad(now.getHours()) + ':' +
                   pad(now.getMinutes()) + ':' +
                   pad(now.getSeconds());
    var fontSize = Math.max(14, Math.round(canvas.width * 0.032));
    var padding  = Math.round(fontSize * 0.5);
    var barH     = fontSize + padding * 2;

    // ── แถบบนสุด: Timestamp (ใหญ่ขึ้น, ไม่ bold, โปร่งแสง) ──
    var tsFontSize = Math.round(fontSize * 1.4);
    var tsBarH     = tsFontSize + padding * 2;
    ctx.fillStyle    = 'rgba(0,0,0,0.28)';
    ctx.fillRect(0, 0, canvas.width, tsBarH);
    ctx.font         = tsFontSize + 'px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏱ ' + stamp, padding, tsBarH / 2);

    // ── หยุดกล้อง + แสดง preview ──
    fvStopStream();
    document.getElementById('fvCameraArea').classList.remove('active');
    document.getElementById('fvPreviewArea').classList.add('active');
    document.getElementById('fvPreviewBadge').textContent = stamp;
    document.getElementById('fvBtnCapture').disabled = true;
    document.getElementById('fvBtnOpen').disabled    = false;
    document.getElementById('fvBtnRetake').style.display = 'none';

    var cs = document.getElementById('fvCompactStatus');
    if (cs) cs.textContent = '⏳ กำลังระบุ GPS...';
    fvSetStatus('loading', '⏳', 'กำลังระบุตำแหน่ง GPS...');

    // ── รอ GPS แล้ว finalize ทันที (ไม่ reverse geocode) ──
    function fvFinalizeAndCache(lat, lng) {
        fvDrawGpsBar(canvas, ctx, fontSize, padding, barH, lat, lng);
        fvDataUrl = canvas.toDataURL('image/jpeg', 0.82);
        console.log('📷 รูปพร้อม ขนาด:', Math.round(fvDataUrl.length / 1024), 'KB');
        fvDoCache();  // ปลด overlay + cache background ไม่ reload iframe
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                fvFinalizeAndCache(
                    pos.coords.latitude.toFixed(6),
                    pos.coords.longitude.toFixed(6)
                );
            },
            function(err) {
                console.warn('⚠️ GPS error:', err.message);
                fvFinalizeAndCache('', '');
            },
            { timeout: 5000, maximumAge: 30000 }
        );
    } else {
        fvFinalizeAndCache('', '');
    }
}

/* ── ถ่ายใหม่ ── */
function fvRetake() {
    fvVerified        = false;
    fvDataUrl         = '';
    window.fvCacheKey = '';
    document.getElementById('fvPreviewArea').classList.remove('active');
    document.getElementById('fvBtnRetake').style.display = 'none';
    fvSetStatus('idle', '🎥', 'กดปุ่มเพื่อเปิดกล้องและถ่ายภาพยืนยัน');
    document.getElementById('fvBtnOpen').disabled    = false;
    document.getElementById('fvBtnCapture').disabled = true;
    fvUpdateOverlay();
}

/* ══════════════════════════════════════
   API สำหรับ GAS iframe ดึงข้อมูลรูป
   ══════════════════════════════════════ */
window.fvGetImageData = function() {
    console.log('📷 fvGetImageData — verified:', fvVerified,
                'size:', Math.round(fvDataUrl.length / 1024), 'KB');
    return fvVerified ? fvDataUrl : '';
};

window.fvGetCacheKey = function() {
    return window.fvCacheKey || '';
};

/* ── bind ── */
document.getElementById('fvBtnOpen').addEventListener('click',    fvOpenCamera);
document.getElementById('fvBtnCapture').addEventListener('click', fvCapture);
document.getElementById('fvBtnRetake').addEventListener('click',  fvRetake);
document.getElementById('fvBtnRetake2').addEventListener('click', fvRetake);
window.addEventListener('beforeunload', fvStopStream);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Time Attendance</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Sarabun', Arial, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
}

.page-wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.fv-panel {
    background: white;
    border-bottom: 3px solid #56ab2f;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.fv-title {
    font-weight: 700;
    color: #166534;
    font-size: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.fv-status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    transition: all 0.3s;
}

.fv-status-bar.idle    { background:#f1f5f9; color:#64748b; border:1px solid #cbd5e1; }
.fv-status-bar.ready   { background:#dcfce7; color:#166534; border:1px solid #86efac; }
.fv-status-bar.error   { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
.fv-status-bar.loading { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }

.fv-camera-area {
    display: none;
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    width: 100%;
    aspect-ratio: 4/3;
    max-height: 260px;
    margin-bottom: 10px;
}
.fv-camera-area.active { display: block; }

#fvVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
}

.fv-face-guide {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px;
    border: 3px dashed rgba(134,239,172,0.85);
    border-radius: 50%;
    pointer-events: none;
    animation: fv-pulse 1.8s ease-in-out infinite;
}

@keyframes fv-pulse {
    0%,100% { border-color: rgba(134,239,172,0.85); }
    50%      { border-color: rgba(74,222,128,1); box-shadow: 0 0 0 8px rgba(134,239,172,0); }
}

/* ── Liveness Overlay ── */
.fv-liveness-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding-top: 12px; pointer-events: none; z-index: 10;
}
.fv-liveness-challenge {
    background: rgba(0,0,0,0.72); color: #fff;
    font-size: 15px; font-weight: 700;
    padding: 7px 16px; border-radius: 20px;
    text-align: center; margin-bottom: 6px;
}
.fv-liveness-challenge.success { background: rgba(22,163,74,0.9); }
.fv-liveness-challenge.fail    { background: rgba(220,38,38,0.9); }
.fv-liveness-timer-bar {
    width: 78%; height: 5px;
    background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden;
}
.fv-liveness-timer-fill {
    height: 100%; width: 100%;
    background: #4ade80; border-radius: 4px;
}
.fv-face-guide.lv-ok   { border-color: rgba(74,222,128,1) !important; animation: none; box-shadow: 0 0 0 6px rgba(74,222,128,0.3); }
.fv-face-guide.lv-fail { border-color: rgba(239,68,68,1)  !important; animation: none; }

.fv-preview-area {
    display: none;
    margin-bottom: 10px;
}
.fv-preview-area.active { display: block; }

.fv-compact-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: #dcfce7;
    border: 1px solid #86efac;
    border-radius: 10px;
    padding: 12px;
}

.fv-thumb-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid #16a34a;
}

.fv-thumb-stamp {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    text-align: center;
    padding: 2px 4px;
    white-space: nowrap;
    overflow: hidden;
    z-index: 2;
}

#fvCanvas {
    width: 80px;
    height: 80px;
    display: block;
    object-fit: cover;
}

.fv-compact-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

.fv-compact-status {
    font-size: 13px;
    font-weight: 700;
    color: #166534;
    text-align: center;
}

.fv-compact-retake {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.fv-preview-badge { display: none; }

.fv-btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.fv-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.fv-btn:disabled { opacity:0.4; cursor:not-allowed; }
.fv-btn-open    { background: linear-gradient(135deg,#16a34a,#22c55e); color:#fff; }
.fv-btn-capture { background: linear-gradient(135deg,#0ea5e9,#38bdf8); color:#fff; }
.fv-btn-retake  { background: #f1f5f9; color:#475569; border:1px solid #cbd5e1; }

.fv-no-upload-notice {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 8px;
    text-align: center;
}

.iframe-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
}

iframe {
    border: none;
    width: 100%;
    flex: 1;
    min-height: calc(100vh - 280px);
    display: block;
}

.iframe-block-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
}

.iframe-block-overlay p {
    color: white;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 0 20px;
}

.iframe-loading-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.85);
    z-index: 998;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
}
.iframe-loading-overlay.active { display: flex; }
.iframe-loading-spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2e8f0;
    border-top-color: #16a34a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.iframe-loading-text {
    font-size: 14px;
    font-weight: 600;
    color: #475569;
}
@keyframes spin { to { transform: rotate(360deg); } }

.fv-ready-toast {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(22,163,74,0.45);
    transform: translateY(-100%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    text-align: center;
}
.fv-ready-toast.show { transform: translateY(0); }

.fv-thumb-wrap.pulse-ring {
    animation: thumbPulse 0.6s ease-out 3;
}
@keyframes thumbPulse {
    0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.7); }
    70%  { box-shadow: 0 0 0 10px rgba(22,163,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
}
</style>
</head>
<body>
<div class="page-wrapper">

    <div class="fv-ready-toast" id="fvReadyToast">
        ✅ ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย!
    </div>

    <div class="fv-panel" id="fvPanel">
        <div class="fv-title">📷 ยืนยันตัวตนด้วยใบหน้า <span style="color:#e74c3c">*</span></div>

        <div class="fv-status-bar idle" id="fvStatusBar">
            <span id="fvStatusIcon">🎥</span>
            <span id="fvStatusText">กดปุ่มเพื่อเปิดกล้องและถ่ายภาพยืนยัน</span>
        </div>

        <div class="fv-camera-area" id="fvCameraArea">
            <video id="fvVideo" autoplay playsinline muted></video>
            <div class="fv-face-guide" id="fvFaceGuide"></div>
            <div class="fv-liveness-overlay" id="fvLivenessOverlay" style="display:none">
                <div class="fv-liveness-challenge" id="fvLivenessChallenge"></div>
                <div class="fv-liveness-timer-bar">
                    <div class="fv-liveness-timer-fill" id="fvLivenessTimerFill"></div>
                </div>
            </div>
        </div>

        <div class="fv-preview-area" id="fvPreviewArea">
            <div class="fv-compact-row">
                <div class="fv-thumb-wrap">
                    <div class="fv-thumb-stamp" id="fvPreviewBadge"></div>
                    <canvas id="fvCanvas"></canvas>
                </div>
                <div class="fv-compact-info">
                    <div class="fv-compact-status" id="fvCompactStatus">⏳ กำลังระบุตำแหน่ง...</div>
                    <button class="fv-compact-retake" id="fvBtnRetake2">🔄 ถ่ายใหม่</button>
                </div>
            </div>
        </div>

        <div class="fv-btn-row">
            <button class="fv-btn fv-btn-open"    id="fvBtnOpen">🎥 เปิดกล้อง</button>
            <button class="fv-btn fv-btn-capture" id="fvBtnCapture" disabled>📸 ถ่ายภาพ</button>
            <button class="fv-btn fv-btn-retake"  id="fvBtnRetake" style="display:none">🔄 ถ่ายใหม่</button>
        </div>
        <div class="fv-no-upload-notice">🚫 ระบบไม่อนุญาตให้ Upload รูปภาพ — ถ่ายสดเท่านั้น</div>
    </div>

    <div class="iframe-wrapper">
        <div class="iframe-block-overlay" id="iframeBlockOverlay">
            <p>📷 กรุณายืนยันตัวตนด้วยใบหน้าก่อน</p>
            <p style="font-size:13px; font-weight:400;">กดปุ่ม "เปิดกล้อง" ด้านบน แล้วถ่ายภาพ</p>
        </div>
        <div class="iframe-loading-overlay" id="iframeLoadingOverlay">
            <div class="iframe-loading-spinner"></div>
            <div class="iframe-loading-text" id="iframeLoadingText">⏳ กำลังบันทึกภาพ...</div>
        </div>
        <iframe
            id="app"
            allow="geolocation"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</div>

<script>

/* ══════════════════════════════════════
   State
   ══════════════════════════════════════ */
var fvGasBaseUrl  = '';
var fvStream      = null;
var fvVerified    = false;
var fvDataUrl     = '';

/* ══════════════════════════════════════
   GPS: preload ทันทีที่ page load
   ══════════════════════════════════════ */
var fvCachedLat = '';
var fvCachedLng = '';
var fvGpsReady  = false;

function fvPreloadGps() {
    if (!navigator.geolocation) {
        console.warn('Geolocation ไม่รองรับ');
        fvGpsReady = true;
        return;
    }
    console.log('GPS: pre-loading...');
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            fvCachedLat = pos.coords.latitude.toFixed(6);
            fvCachedLng = pos.coords.longitude.toFixed(6);
            fvGpsReady  = true;
            console.log('GPS cached:', fvCachedLat, fvCachedLng, '+-' + Math.round(pos.coords.accuracy) + 'm');
        },
        function(err) {
            fvGpsReady = true;
            console.warn('GPS preload error code:', err.code, err.message);
        },
        { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 }
    );
}

/* ══════════════════════════════════════
   DOMContentLoaded
   ══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {

    fvPreloadGps();

    var params = new URLSearchParams(window.location.search);
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxQktYn2Z5V_TQT_Kc_Ui9U6LoekMUaWBmwGmesS2T-_OgbOWG-wahxZZPwoR-aZ5Gr/exec';

    var query         = [];
    var page          = params.get('page');
    var empCode       = params.get('empCode');
    var spreadsheetId = params.get('spreadsheetId');
    var sheetName     = params.get('sheetName');

    if (page)          query.push('page='          + encodeURIComponent(page));
    if (empCode)       query.push('empCode='       + encodeURIComponent(empCode));
    if (spreadsheetId) query.push('spreadsheetId=' + encodeURIComponent(spreadsheetId));
    if (sheetName)     query.push('sheetName='     + encodeURIComponent(sheetName));

    var finalUrl = GAS_URL + (query.length ? '?' + query.join('&') : '');
    console.log('Load GAS:', finalUrl);
    document.getElementById('app').src = finalUrl;
    fvGasBaseUrl = finalUrl;

    fvUpdateOverlay();
});

/* ══════════════════════════════════════
   UI Helpers
   ══════════════════════════════════════ */
function fvSetStatus(type, icon, text) {
    var bar = document.getElementById('fvStatusBar');
    bar.className = 'fv-status-bar ' + type;
    document.getElementById('fvStatusIcon').textContent = icon;
    document.getElementById('fvStatusText').textContent = text;
}

function fvStopStream() {
    if (fvStream) {
        fvStream.getTracks().forEach(function(t) { t.stop(); });
        fvStream = null;
    }
}

function fvUpdateOverlay() {
    var overlay = document.getElementById('iframeBlockOverlay');
    if (!overlay) return;
    overlay.style.display = fvVerified ? 'none' : 'flex';
}

function fvShowIframeLoading(msg) {
    var overlay = document.getElementById('iframeLoadingOverlay');
    var text    = document.getElementById('iframeLoadingText');
    if (overlay) overlay.classList.add('active');
    if (text && msg) text.textContent = msg;
}

function fvHideIframeLoading() {
    var overlay = document.getElementById('iframeLoadingOverlay');
    if (overlay) overlay.classList.remove('active');
}

/* ══════════════════════════════════════
   เปิดกล้อง
   ══════════════════════════════════════ */
function fvOpenCamera() {
    fvSetStatus('loading', '⏳', 'กำลังเปิดกล้อง...');

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        fvSetStatus('error', '❌', 'Browser ไม่รองรับกล้อง กรุณาใช้ Chrome/Safari');
        return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(stream) {
            fvStream = stream;
            var video = document.getElementById('fvVideo');
            video.srcObject = stream;
            document.getElementById('fvCameraArea').classList.add('active');
            document.getElementById('fvPreviewArea').classList.remove('active');
            document.getElementById('fvBtnOpen').disabled    = true;
            document.getElementById('fvBtnCapture').disabled = false;
            document.getElementById('fvBtnRetake').style.display = 'none';
            fvSetStatus('loading', '📷', 'กล้องพร้อมแล้ว — จัดหน้าให้อยู่ในวงกลม แล้วกด "ถ่ายภาพ"');
            fvVerified = false;
            fvDataUrl  = '';
        })
        .catch(function(err) {
            console.error('Camera error:', err.name, err.message);
            var msg;
            if (err.name === 'NotAllowedError') {
                msg = 'ไม่ได้รับอนุญาตใช้กล้อง — กรุณากด Allow ที่ popup หรือใน Site Settings';
            } else if (err.name === 'NotFoundError') {
                msg = 'ไม่พบกล้องในอุปกรณ์นี้ — กรุณาใช้มือถือหรือเชื่อมต่อ Webcam';
            } else if (err.name === 'NotReadableError') {
                msg = 'กล้องถูกใช้งานโดย app อื่นอยู่ — กรุณาปิด app อื่นก่อน';
            } else if (err.name === 'OverconstrainedError') {
                fvSetStatus('loading', '⏳', 'กำลังลองเปิดกล้องแบบสำรอง...');
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(function(stream) {
                        fvStream = stream;
                        document.getElementById('fvVideo').srcObject = stream;
                        document.getElementById('fvCameraArea').classList.add('active');
                        document.getElementById('fvPreviewArea').classList.remove('active');
                        document.getElementById('fvBtnOpen').disabled    = true;
                        document.getElementById('fvBtnCapture').disabled = false;
                        document.getElementById('fvBtnRetake').style.display = 'none';
                        fvSetStatus('loading', '📷', 'กล้องพร้อมแล้ว — จัดหน้าให้อยู่ในวงกลม แล้วกด "ถ่ายภาพ"');
                        fvVerified = false;
                    })
                    .catch(function(err2) {
                        fvSetStatus('error', '❌', 'ไม่สามารถเปิดกล้องได้: ' + err2.message);
                        document.getElementById('fvBtnOpen').disabled = false;
                    });
                return;
            } else {
                msg = 'ไม่สามารถเปิดกล้องได้: ' + err.name + ' — ' + err.message;
            }
            fvSetStatus('error', '❌', msg);
            document.getElementById('fvBtnOpen').disabled = false;
        });
}

/* ══════════════════════════════════════
   วาดแถบ GPS + Address ด้านล่างรูป
   ══════════════════════════════════════ */
function fvDrawGpsBar(canvas, ctx, fontSize, padding, barH, lat, lng, address) {
    var lineH  = barH;
    var totalH = lineH * 2;
    var barTop = canvas.height - totalH;
    var maxW   = canvas.width - padding * 2;

    ctx.fillStyle = 'rgba(0,70,0,0.68)';
    ctx.fillRect(0, barTop, canvas.width, totalH);

    ctx.font         = 'bold ' + fontSize + 'px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textBaseline = 'middle';

    var coordText = (lat && lng)
        ? '\uD83D\uDCCD ' + lat + ', ' + lng
        : '\uD83D\uDCCD GPS: ไม่สามารถระบุตำแหน่งได้';
    ctx.fillText(coordText, padding, barTop + lineH / 2, maxW);

    var addrText = address ? address : '';
    if (addrText) {
        ctx.font = fontSize + 'px sans-serif';
        if (ctx.measureText(addrText).width > maxW) {
            var lo = 0, hi = addrText.length;
            while (lo < hi - 1) {
                var mid = Math.floor((lo + hi) / 2);
                if (ctx.measureText(addrText.slice(0, mid) + '...').width <= maxW) {
                    lo = mid;
                } else {
                    hi = mid;
                }
            }
            addrText = addrText.slice(0, lo) + '...';
        }
        ctx.fillStyle = '#d1fae5';
        ctx.fillText(addrText, padding, barTop + lineH + lineH / 2, maxW);
    }
}

/* ══════════════════════════════════════
   Cache รูปไป GAS
   ══════════════════════════════════════ */
function fvDoCache(retryCount) {
    retryCount = retryCount || 0;
    var MAX_RETRY    = 3;
    var GAS_EXEC_URL = fvGasBaseUrl
        ? fvGasBaseUrl.replace(/[?&]fvKey=[^&]*/g, '').replace(/&&/g, '&').replace(/[?&]$/, '')
        : 'https://script.google.com/macros/s/AKfycbxQktYn2Z5V_TQT_Kc_Ui9U6LoekMUaWBmwGmesS2T-_OgbOWG-wahxZZPwoR-aZ5Gr/exec';

    if (!fvDataUrl || fvDataUrl.length < 100) {
        console.error('fvDataUrl ว่าง — ยกเลิก cache');
        fvHideIframeLoading();
        fvSetStatus('error', '❌', 'เกิดข้อผิดพลาด: ไม่มีข้อมูลภาพ กรุณาถ่ายใหม่');
        var cs0 = document.getElementById('fvCompactStatus');
        if (cs0) cs0.textContent = '❌ ไม่มีภาพ กรุณาถ่ายใหม่';
        return;
    }

    var attempt = retryCount + 1;
    console.log('Cache attempt ' + attempt + '/' + MAX_RETRY + ' size:', Math.round(fvDataUrl.length/1024), 'KB');

    if (retryCount === 0) {
        fvShowIframeLoading('⏳ กำลังบันทึกภาพ... (' + attempt + '/' + MAX_RETRY + ')');
    } else {
        fvShowIframeLoading('⏳ กำลังลองใหม่ครั้งที่ ' + attempt + '...');
    }

    fetch(GAS_EXEC_URL, {
        method  : 'POST',
        body    : JSON.stringify({ action: 'cacheFaceUrl', imageData: fvDataUrl }),
        redirect: 'follow'
    })
    .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
    })
    .then(function(text) {
        console.log('Cache response:', text);
        var result;
        try { result = JSON.parse(text); } catch(e) { throw new Error('Parse error: ' + text.slice(0, 80)); }

        if (result.status === 'success' && result.cacheKey) {
            console.log('Cache key:', result.cacheKey);

            var iframeEl = document.getElementById('app');
            var baseUrl  = GAS_EXEC_URL;
            var sep = baseUrl.indexOf('?') >= 0 ? '&' : '?';

            fvShowIframeLoading('⏳ กำลังโหลดแบบฟอร์ม... รอสักครู่');
            var csLoading = document.getElementById('fvCompactStatus');
            if (csLoading) csLoading.textContent = '⏳ กำลังโหลดแบบฟอร์ม...';
            fvSetStatus('loading', '⏳', 'ภาพบันทึกแล้ว — กำลังโหลดแบบฟอร์ม รอสักครู่...');

            var iframeLoadTimer = setTimeout(function() {
                console.warn('⚠️ iframe load timeout — unlock form anyway');
                iframeEl.onload = null;
                fvHideIframeLoading();
                fvSetStatus('ready', '✅', 'ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย');
                var csT = document.getElementById('fvCompactStatus');
                if (csT) csT.textContent = '✅ ยืนยันตัวตนสำเร็จ';
                fvUpdateOverlay();
                fvShowReadyToast();
            }, 20000);

            iframeEl.onload = function() {
                clearTimeout(iframeLoadTimer);
                iframeEl.onload = null;
                console.log('✅ iframe load complete — form ready');

                if (fvDataUrl && fvDataUrl.length > 100) {
                    try {
                        iframeEl.contentWindow.postMessage(
                            { type: 'fvImageData', imageData: fvDataUrl },
                            '*'
                        );
                        console.log('📤 ส่ง fvImageData ผ่าน postMessage:', Math.round(fvDataUrl.length/1024), 'KB');
                    } catch(pmErr) {
                        console.warn('⚠️ postMessage fvImageData ไม่สำเร็จ:', pmErr.message);
                    }
                }

                fvHideIframeLoading();
                fvSetStatus('ready', '✅', 'ยืนยันตัวตนสำเร็จ — กรอกข้อมูลแล้วกดบันทึกได้เลย');
                var cs = document.getElementById('fvCompactStatus');
                if (cs) cs.textContent = '✅ ยืนยันตัวตนสำเร็จ';
                fvUpdateOverlay();
                fvShowReadyToast();
            };

            iframeEl.src = baseUrl + sep + 'fvKey=' + encodeURIComponent(result.cacheKey)
                         + '&fvTsBarH=' + encodeURIComponent(window._fvTsBarH  || 46)
                         + '&fvImgW='   + encodeURIComponent(window._fvCanvasW || 640)
                         + '&fvImgH='   + encodeURIComponent(window._fvCanvasH || 480);
            console.log('✅ iframe reload with fvKey:', result.cacheKey, 'tsBarH:', window._fvTsBarH, 'size:', window._fvCanvasW + 'x' + window._fvCanvasH);

        } else {
            throw new Error('GAS status: ' + (result.status || 'unknown'));
        }
    })
    .catch(function(err) {
        console.error('Cache error (attempt ' + attempt + '):', err.message || err);

        if (retryCount < MAX_RETRY - 1) {
            var delay = Math.pow(2, retryCount + 1) * 1000;
            console.log('Retry in ' + (delay/1000) + 's...');
            setTimeout(function() { fvDoCache(retryCount + 1); }, delay);
        } else {
            fvHideIframeLoading();
            console.error('Cache failed after ' + MAX_RETRY + ' attempts');
            fvSetStatus('error', '❌', 'บันทึกภาพไม่สำเร็จ กรุณากดถ่ายใหม่');
            var cs2 = document.getElementById('fvCompactStatus');
            if (cs2) cs2.textContent = '❌ บันทึกไม่สำเร็จ กรุณาถ่ายใหม่';
        }
    });
}

/* ══════════════════════════════════════
   fvCaptureToDataUrl
   — ถ่ายภาพจาก video ลง offscreen canvas
     ใส่ timestamp + GPS แล้วเก็บใน fvDataUrl
     เรียกใช้ก่อน liveness challenge
     callback(ok) เมื่อเสร็จ
   ══════════════════════════════════════ */
function fvCaptureToDataUrl(callback) {
    var video  = document.getElementById('fvVideo');
    var canvas = document.getElementById('fvCanvas');
    if (!video.videoWidth) {
        callback(false);
        return;
    }

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    var ctx = canvas.getContext('2d');

    /* วาดภาพ mirror */
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    /* Timestamp */
    var now   = new Date();
    var pad   = function(n) { return n < 10 ? '0' + n : '' + n; };
    var stamp = pad(now.getDate()) + '/' +
                pad(now.getMonth() + 1) + '/' +
                now.getFullYear() + '  ' +
                pad(now.getHours()) + ':' +
                pad(now.getMinutes()) + ':' +
                pad(now.getSeconds());

    var gpsFontSize = Math.max(14, Math.round(canvas.width * 0.032));
    var gpsBarH     = gpsFontSize + Math.round(gpsFontSize * 0.5) * 2;
    var tsFontSize  = Math.max(18, Math.round(canvas.width * 0.048));
    var tsPadding   = Math.round(tsFontSize * 0.5);
    var tsBarH      = tsFontSize + tsPadding * 2;
    var gpsPadding  = Math.round(gpsFontSize * 0.5);

    window._fvTsBarH  = tsBarH;
    window._fvCanvasW = canvas.width;
    window._fvCanvasH = canvas.height;

    /* แถบ timestamp บนสุด */
    ctx.fillStyle    = 'rgba(0,0,0,0.30)';
    ctx.fillRect(0, 0, canvas.width, tsBarH);
    ctx.font         = tsFontSize + 'px monospace';
    ctx.fillStyle    = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u23F1 ' + stamp, tsPadding, tsBarH / 2);

    /* อัปเดต preview badge */
    document.getElementById('fvPreviewBadge').textContent = stamp;

    /* เสร็จแล้วดึง GPS แล้ว finalize */
    function doFinalize(useLat, useLng, addr) {
        fvDrawGpsBar(canvas, ctx, gpsFontSize, gpsPadding, gpsBarH, useLat, useLng, addr || '');
        fvDataUrl = canvas.toDataURL('image/jpeg', 0.82);
        console.log('Captured size:', Math.round(fvDataUrl.length/1024), 'KB',
                    useLat ? 'GPS:' + useLat : 'no GPS',
                    addr   ? 'addr:ok' : 'no addr');
        callback(true);
    }

    function withGps(lat, lng) {
        var useLat = (lat && lat !== '') ? lat : fvCachedLat;
        var useLng = (lng && lng !== '') ? lng : fvCachedLng;
        if (useLat && useLng) {
            var done  = false;
            var timer = setTimeout(function() {
                if (done) return; done = true;
                doFinalize(useLat, useLng, '');
            }, 4000);
            fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + useLat + '&lon=' + useLng + '&accept-language=th',
                  { headers: { 'Accept-Language': 'th' } })
                .then(function(r) { return r.json(); })
                .then(function(geo) {
                    if (done) return; done = true;
                    clearTimeout(timer);
                    doFinalize(useLat, useLng, geo.display_name || '');
                })
                .catch(function() {
                    if (done) return; done = true;
                    clearTimeout(timer);
                    doFinalize(useLat, useLng, '');
                });
        } else {
            doFinalize('', '', '');
        }
    }

    if (fvCachedLat && fvCachedLng) {
        withGps(fvCachedLat, fvCachedLng);
    } else if (!fvGpsReady) {
        var waitGps = setInterval(function() {
            if (fvGpsReady) { clearInterval(waitGps); withGps(fvCachedLat, fvCachedLng); }
        }, 300);
        setTimeout(function() {
            clearInterval(waitGps);
            fvGpsReady = true;
            withGps('', '');
        }, 16000);
    } else {
        withGps('', '');
    }
}

/* ══════════════════════════════════════════════════════
   LIVENESS DETECTION v3  — 4 Actions
   กระพริบตา / อ้าปาก / หันหน้าซ้าย / หันหน้าขวา
   ใช้ FaceMesh เท่านั้น (ไม่ต้องโหลด Hands)
   ══════════════════════════════════════════════════════ */
var _lv = {
    faceMesh   : null,
    faceLoaded : false,
    modelsReady: false,
    loading    : false,
    active  : false, passed : false,
    challenge : '', count : 0, need : 2, inAction : false,
    blinkF : 0, mouthF : 0, turnF : 0,
    blinkLock : false, mouthLock : false, turnLock : false,
    detLoop : null, timer : null, timeLimit : 8000
};

/* ── threshold ── */
var LV_EAR_CLOSE    = 0.22;  /* EAR ต่ำกว่านี้ = หลับตา                       */
var LV_MAR_OPEN     = 0.35;  /* MAR สูงกว่านี้ = อ้าปาก                        */
var LV_YAW_THRESH   = 0.18;  /* offset > นี้ = หันหน้า (ต้องหันชัดพอ)          */
var LV_YAW_CENTER   = 0.06;  /* offset < นี้ = กลับมาหน้าตรงแล้ว (reset lock) */
var LV_FRAMES       = 3;     /* frame ติดกัน ตา/ปาก                            */
var LV_TURN_FRAMES  = 5;     /* frame ติดกัน หันหน้า                           */

/* ── action pool: ตา / ปาก / ซ้าย / ขวา ── */
var LV_ACTIONS = ['blink', 'mouth', 'turnLeft', 'turnRight'];
var LV_TEXT    = {
    blink     : '👁️  กระพริบตา',
    mouth     : '😮  อ้าปากค้างไว้',
    turnLeft  : '⬅️  หันหน้าไปทางซ้าย',
    turnRight : '➡️  หันหน้าไปทางขวา'
};

/* ── reset ── */
function lvReset() {
    _lv.active = false; _lv.passed = false;
    _lv.challenge = ''; _lv.count = 0; _lv.inAction = false;
    _lv.blinkF = 0; _lv.mouthF = 0; _lv.turnF = 0;
    _lv.blinkLock = false; _lv.mouthLock = false; _lv.turnLock = false;
    clearInterval(_lv.detLoop); clearTimeout(_lv.timer);
    var ov = document.getElementById('fvLivenessOverlay');
    var fg = document.getElementById('fvFaceGuide');
    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    if (ov) ov.style.display = 'none';
    if (fg) fg.className = 'fv-face-guide';
    if (ch) { ch.textContent = ''; ch.className = 'fv-liveness-challenge'; }
    if (tf) { tf.style.transition = 'none'; tf.style.width = '100%'; tf.style.background = '#4ade80'; }
}

/* ── EAR ── */
function lvEAR(lm, p) {
    var d = function(a,b){ return Math.hypot(lm[a].x-lm[b].x, lm[a].y-lm[b].y); };
    return (d(p[1],p[5]) + d(p[2],p[4])) / (2*d(p[0],p[3]));
}

/* ── MAR ── */
function lvMAR(lm) {
    var d = function(a,b){ return Math.hypot(lm[a].x-lm[b].x, lm[a].y-lm[b].y); };
    return (d(82,87) + d(13,14) + d(312,317)) / (3*d(61,291));
}

/*
 * ── YAW: วัดการหันหน้าซ้าย/ขวา จาก FaceMesh ──
 *
 * ใช้จุด landmark มาตรฐานของ FaceMesh 468 จุด:
 *   - จุด 1   = nose tip (ปลายจมูก)
 *   - จุด 234 = left cheek / ear area (แก้มซ้าย ใกล้หู)
 *   - จุด 454 = right cheek / ear area (แก้มขวา ใกล้หู)
 *
 * midX = ค่ากลางระหว่างหูซ้าย-ขวา (normalized 0-1)
 * offset = noseX - midX
 *   offset > 0  → จมูกอยู่ขวา midpoint → หน้าหันซ้าย (มุมมองกล้อง)
 *   offset < 0  → จมูกอยู่ซ้าย midpoint → หน้าหันขวา
 *
 * หมายเหตุ: video ถูก mirror (transform: scaleX(-1)) ดังนั้น
 *   turnLeft  ใน display = offset เป็นบวก (nose ไปทางขวาของ frame)
 *   turnRight ใน display = offset เป็นลบ  (nose ไปทางซ้ายของ frame)
 */
function lvGetYawOffset(lm) {
    var noseX  = lm[1].x;
    var leftX  = lm[234].x;
    var rightX = lm[454].x;
    var midX   = (leftX + rightX) / 2;
    return noseX - midX;
}

/* ── รับผล FaceMesh ── */
function lvOnFaceResults(res) {
    if (!_lv.active || _lv.passed) return;
    if (!res.multiFaceLandmarks || !res.multiFaceLandmarks.length) {
        /* ไม่เจอหน้า → reset counter ชั่วคราว */
        _lv.blinkF = 0; _lv.mouthF = 0; _lv.turnF = 0;
        return;
    }

    var lm  = res.multiFaceLandmarks[0];
    var ch  = _lv.challenge;

    /* ── กระพริบตา ── */
    if (ch === 'blink') {
        var ear = (lvEAR(lm,[362,385,387,263,373,380]) + lvEAR(lm,[33,160,158,133,153,144])) / 2;
        /* ปลด lock เมื่อลืมตากลับแล้ว (EAR สูงกว่า threshold ชัดเจน) */
        if (_lv.blinkLock && ear > LV_EAR_CLOSE + 0.06) {
            _lv.blinkLock = false;
            _lv.inAction  = false;
            _lv.blinkF    = 0;
        }
        if (ear < LV_EAR_CLOSE && !_lv.blinkLock) {
            _lv.blinkF++;
            if (_lv.blinkF >= LV_FRAMES && !_lv.inAction) {
                _lv.inAction  = true;
                _lv.blinkLock = true;  /* ล็อค รอลืมตากลับ */
                _lv.blinkF    = 0;
                lvCountAction();
            }
        } else if (!_lv.blinkLock) {
            _lv.blinkF = 0;
        }
        return;
    }

    /* ── อ้าปาก ── */
    if (ch === 'mouth') {
        var mar = lvMAR(lm);
        /* ปลด lock เมื่อปิดปากกลับแล้ว */
        if (_lv.mouthLock && mar < LV_MAR_OPEN - 0.08) {
            _lv.mouthLock = false;
            _lv.inAction  = false;
            _lv.mouthF    = 0;
        }
        if (mar > LV_MAR_OPEN && !_lv.mouthLock) {
            _lv.mouthF++;
            if (_lv.mouthF >= LV_FRAMES && !_lv.inAction) {
                _lv.inAction  = true;
                _lv.mouthLock = true;  /* ล็อค รอปิดปากกลับ */
                _lv.mouthF    = 0;
                lvCountAction();
            }
        } else if (!_lv.mouthLock) {
            _lv.mouthF = 0;
        }
        return;
    }

    /* ── หันหน้าซ้าย/ขวา ── */
    if (ch === 'turnLeft' || ch === 'turnRight') {
        var offset = lvGetYawOffset(lm);
        var absOff = Math.abs(offset);
        /*
         * กล้อง mirror:
         *   turnLeft  → user หันซ้าย → ใน frame จมูกเลื่อนขวา → offset > 0
         *   turnRight → user หันขวา → ใน frame จมูกเลื่อนซ้าย → offset < 0
         *
         * _lv.turnLock = true หลังนับ 1 ครั้ง → ต้องกลับหน้าตรง (absOff < LV_YAW_CENTER)
         * ก่อนจึงจะนับครั้งถัดไปได้ ป้องกัน false positive จากค้างหน้า
         */
        var isTurning = (ch === 'turnLeft')
            ?  (offset >  LV_YAW_THRESH)
            :  (offset < -LV_YAW_THRESH);

        /* ปลด lock เมื่อกลับมาหน้าตรงแล้ว */
        if (_lv.turnLock && absOff < LV_YAW_CENTER) {
            _lv.turnLock  = false;
            _lv.inAction  = false;
            _lv.turnF     = 0;
        }

        if (isTurning && !_lv.turnLock) {
            _lv.turnF++;
            if (_lv.turnF >= LV_TURN_FRAMES && !_lv.inAction) {
                _lv.inAction  = true;
                _lv.turnLock  = true;   /* ล็อค รอกลับหน้าตรง */
                _lv.turnF     = 0;
                lvCountAction();
            }
        } else if (!isTurning && !_lv.turnLock) {
            _lv.turnF = 0;
        }
    }
}

/* ── นับ action ที่สำเร็จ ── */
function lvCountAction() {
    _lv.count++;
    var ch = document.getElementById('fvLivenessChallenge');
    if (_lv.count >= _lv.need) {
        lvPass();
    } else {
        if (ch) ch.textContent = LV_TEXT[_lv.challenge] + ' (' + _lv.count + '/' + _lv.need + ')';
        fvSetStatus('loading','🔍','ทำแล้ว ' + _lv.count + '/' + _lv.need + ' ครั้ง — ทำต่ออีกครั้ง!');
    }
}

/* ── โหลด FaceMesh ── */
function lvLoad(cb) {
    if (_lv.modelsReady) { cb(); return; }
    if (_lv.loading) {
        var w = setInterval(function(){ if(_lv.modelsReady){ clearInterval(w); cb(); } }, 200);
        return;
    }
    _lv.loading = true;
    fvSetStatus('loading','⏳','กำลังโหลดระบบตรวจจับ...');

    function loadScript(url, next) {
        var s = document.createElement('script'); s.src = url;
        s.onload = next; s.onerror = next; document.head.appendChild(s);
    }

    loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js', function(){
        if (typeof FaceMesh !== 'undefined') {
            _lv.faceMesh = new FaceMesh({ locateFile: function(f){
                return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f; }});
            _lv.faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true,
                minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
            _lv.faceMesh.onResults(lvOnFaceResults);
            _lv.faceMesh.initialize()
                .then(function(){ _lv.faceLoaded=true; _lv.modelsReady=true; _lv.loading=false; cb(); })
                .catch(function(){ _lv.modelsReady=true; _lv.loading=false; cb(); });
        } else {
            _lv.modelsReady=true; _lv.loading=false; cb();
        }
    });
}

/* ── ส่ง frame ── */
function lvSendFrame() {
    if (!_lv.active) return;
    var v = document.getElementById('fvVideo');
    if (!v || v.readyState < 2) return;
    if (_lv.faceMesh) _lv.faceMesh.send({ image: v }).catch(function(){});
}

/* ── เริ่ม Challenge ── */
function lvStart() {
    _lv.challenge = LV_ACTIONS[Math.floor(Math.random()*LV_ACTIONS.length)];
    _lv.active = true; _lv.passed = false;
    _lv.count = 0; _lv.inAction = false;
    _lv.blinkF = 0; _lv.mouthF = 0; _lv.turnF = 0;
    _lv.blinkLock = false; _lv.mouthLock = false; _lv.turnLock = false;
    var ov = document.getElementById('fvLivenessOverlay');
    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    var fg = document.getElementById('fvFaceGuide');
    if (ov) ov.style.display = 'flex';
    if (fg) fg.className = 'fv-face-guide';
    if (ch) { ch.textContent = LV_TEXT[_lv.challenge]+' (0/'+_lv.need+')'; ch.className = 'fv-liveness-challenge'; }
    if (tf) { tf.style.transition='none'; tf.style.width='100%'; tf.style.background='#4ade80'; }
    setTimeout(function(){ if(tf){
        tf.style.transition='width '+(_lv.timeLimit/1000)+'s linear'; tf.style.width='0%';
    }},50);
    fvSetStatus('loading','🔍', LV_TEXT[_lv.challenge]+' ให้ครบ '+_lv.need+' ครั้ง');
    _lv.detLoop = setInterval(lvSendFrame, 100);
    _lv.timer   = setTimeout(function(){ if(!_lv.passed) lvFail(); }, _lv.timeLimit);
}

/* ── ผ่าน: ใช้ภาพที่ capture ไว้แล้ว (fvDataUrl) ส่ง GAS โดยตรง ── */
function lvPass() {
    if (_lv.passed) return;
    _lv.passed = true; _lv.active = false;
    clearInterval(_lv.detLoop); clearTimeout(_lv.timer);
    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    var fg = document.getElementById('fvFaceGuide');
    if (ch) { ch.textContent = '✅ ยืนยันตัวตนสำเร็จ!'; ch.className = 'fv-liveness-challenge success'; }
    if (tf) { tf.style.transition='none'; tf.style.width='100%'; tf.style.background='#4ade80'; }
    if (fg) fg.className = 'fv-face-guide lv-ok';
    fvSetStatus('loading','✅','ผ่านการยืนยัน — กำลังบันทึก...');
    /* หยุดกล้อง + ซ่อน overlay */
    fvStopStream();
    document.getElementById('fvCameraArea').classList.remove('active');
    document.getElementById('fvBtnCapture').disabled = true;
    document.getElementById('fvBtnOpen').disabled    = false;
    fvVerified = true;
    setTimeout(function(){
        var ov = document.getElementById('fvLivenessOverlay');
        if (ov) ov.style.display = 'none';
        if (fg) fg.className = 'fv-face-guide';
        var cs = document.getElementById('fvCompactStatus');
        if (cs) cs.textContent = '⏳ กำลังบันทึก...';
        /* ส่งภาพแรกที่ capture ไว้ ไม่ถ่ายใหม่ */
        fvDoCache();
    }, 600);
}

/* ── ไม่ผ่าน: ล้างภาพ กลับไปเปิดกล้องใหม่ ── */
function lvFail() {
    _lv.active = false;
    clearInterval(_lv.detLoop); clearTimeout(_lv.timer);
    /* ล้างภาพที่ capture ไว้ (ยังไม่ผ่าน liveness) */
    fvDataUrl  = '';
    fvVerified = false;
    var ch = document.getElementById('fvLivenessChallenge');
    var tf = document.getElementById('fvLivenessTimerFill');
    var fg = document.getElementById('fvFaceGuide');
    if (ch) { ch.textContent = '⏱️ หมดเวลา — กดถ่ายใหม่'; ch.className = 'fv-liveness-challenge fail'; }
    if (tf) { tf.style.transition='none'; tf.style.width='0%'; tf.style.background='#ef4444'; }
    if (fg) fg.className = 'fv-face-guide lv-fail';
    fvSetStatus('error','⚠️','หมดเวลา — กดปุ่ม "ถ่ายภาพ" เพื่อลองใหม่');
    document.getElementById('fvBtnCapture').disabled = false;
    setTimeout(function(){
        lvReset();
        fvSetStatus('loading','📷','กล้องพร้อม — กด "ถ่ายภาพ" เพื่อเริ่มใหม่');
    }, 1800);
}

/* ── Entry point ── */
function fvStartLiveness() {
    document.getElementById('fvBtnCapture').disabled = true;
    var video  = document.getElementById('fvVideo');
    if (!video || !video.videoWidth) {
        fvSetStatus('error','⚠️','กล้องยังไม่พร้อม');
        document.getElementById('fvBtnCapture').disabled = false;
        return;
    }

    /* Step 1: แสดง preview area ก่อน */
    document.getElementById('fvPreviewArea').classList.add('active');
    fvSetStatus('loading','⏳','กำลังระบุตำแหน่ง GPS...');
    var cs = document.getElementById('fvCompactStatus');
    if (cs) cs.textContent = '⏳ กำลังระบุตำแหน่ง GPS...';

    /* Step 2: capture ภาพหน้าตรงพร้อม GPS ทันที */
    fvCaptureToDataUrl(function(ok) {
        if (!ok) {
            fvSetStatus('error','⚠️','ถ่ายภาพไม่สำเร็จ — กรุณาลองใหม่');
            document.getElementById('fvBtnCapture').disabled = false;
            document.getElementById('fvPreviewArea').classList.remove('active');
            return;
        }
        /* Step 3: โหลด FaceMesh แล้วเริ่ม liveness challenge */
        if (cs) cs.textContent = '⏳ กำลังโหลดระบบตรวจจับ...';
        fvSetStatus('loading','⏳','ถ่ายภาพแล้ว — กำลังโหลดระบบตรวจจับ...');
        lvLoad(function(){
            if (!_lv.modelsReady) {
                /* FaceMesh โหลดไม่ได้ — ข้าม liveness แล้ว cache ภาพแรกเลย */
                fvVerified = true;
                fvStopStream();
                document.getElementById('fvCameraArea').classList.remove('active');
                document.getElementById('fvBtnOpen').disabled = false;
                fvDoCache();
                return;
            }
            lvStart();
        });
    });
}

/* ── ถ่ายใหม่ ── */
function fvLvRetake() {
    lvReset();
    fvVerified = false; fvDataUrl = '';
    fvHideIframeLoading();
    document.getElementById('fvPreviewArea').classList.remove('active');
    document.getElementById('fvBtnRetake').style.display = 'none';
    fvSetStatus('idle','🎥','กดปุ่มเพื่อเปิดกล้องและถ่ายภาพยืนยัน');
    document.getElementById('fvBtnOpen').disabled    = false;
    document.getElementById('fvBtnCapture').disabled = true;
    fvUpdateOverlay();
}

</script>

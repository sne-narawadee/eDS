<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Time Attendance</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#ffffff;
    overflow:hidden;
}

iframe{
    border:none;
    width:100%;
    height:100vh;
    display:block;
}

</style>

<script>

document.addEventListener("DOMContentLoaded", function(){

    // =========================
    // QR Parameter
    // =========================

    const params = new URLSearchParams(window.location.search);

    const empCode = params.get("empCode");
    const spreadsheetId = params.get("spreadsheetId");
    const sheetName = params.get("sheetName");
    const page = params.get("page") || "index";

    // =========================
    // GAS WebApp URL
    // =========================

    const GAS_URL =
    "https://script.google.com/macros/s/AKfycbzaDECf0Q3rNtLRf8WiAQJr0sTJvO3dwY0JCTHQwGof7sFMFdz_5WeSy6SR1niXtz8W/exec";

    // =========================
    // Build URL
    // =========================

    let url = GAS_URL + "?page=" + encodeURIComponent(page);

    if(empCode){
        url += "&empCode=" + encodeURIComponent(empCode);
    }

    // รองรับ QR เก่า
    if(spreadsheetId){
        url += "&spreadsheetId=" + encodeURIComponent(spreadsheetId);
    }

    if(sheetName){
        url += "&sheetName=" + encodeURIComponent(sheetName);
    }

    console.log("Load GAS:", url);

    // =========================
    // Load GAS
    // =========================

    const iframe = document.getElementById("app");

    if(iframe){
        iframe.src = url;
    }

});

</script>

</head>

<body>

<iframe
id="app"
allow="geolocation"
loading="lazy">
</iframe>

</body>

</html>

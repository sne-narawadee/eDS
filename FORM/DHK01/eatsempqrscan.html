<!-- eatsempqrscan.html -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eDS-Checkpoint Report</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ปิดการเลื่อน */
        }
        iframe {
            border: 0; /* ปิดขอบของ iframe */
            width: 100%;
            height: 100%;
            display: block; /* ปิดช่องว่างภายใน iframe */
        }
    </style>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
    
        var urlParams = new URLSearchParams(window.location.search);
    
        var empCode = urlParams.get('empCode');
        var spreadsheetId = urlParams.get('spreadsheetId');
        var sheetName = urlParams.get('sheetName');
    
        var googleScriptUrl = "https://script.google.com/macros/s/AKfycbzaDECf0Q3rNtLRf8WiAQJr0sTJvO3dwY0JCTHQwGof7sFMFdz_5WeSy6SR1niXtz8W/exec";
    
        var paramsToPass = [];
    
        if (empCode) paramsToPass.push(`empCode=${empCode}`);
        if (spreadsheetId) paramsToPass.push(`spreadsheetId=${spreadsheetId}`);
        if (sheetName) paramsToPass.push(`sheetName=${sheetName}`);
    
        if (paramsToPass.length > 0) {
            googleScriptUrl += "?" + paramsToPass.join("&");
        }
    
        var iframe = document.getElementById('app');
        if (iframe) {
            iframe.src = googleScriptUrl;
        }
    });
    </script>
</head>
<body>
    <iframe
      id="app"
      src="" allow="geolocation"
      frameborder="0"
      scrolling="no">
    </iframe>
</body>
</html>

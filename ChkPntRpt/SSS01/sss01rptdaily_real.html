<!----- Auto size iframe full screen ----->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#8B0000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>eDS-Checkpoint Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #f8f9fa; }
        iframe { border: 0; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <iframe
        id="app"
        name="app"
        src="https://script.google.com/macros/s/AKfycbwCtWZZpeaMIVoSapDpOBXsQSsuLbhjjyFksBWPEv_ZaEROb18p8IWu5RfBLRU_N8tB/exec"
        allow="geolocation"
        frameborder="0"
        scrolling="auto">
    </iframe>
</body>
</html>

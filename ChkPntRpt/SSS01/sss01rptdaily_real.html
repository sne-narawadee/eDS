<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>eDS-Checkpoint Report</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            border: 0;
            width: 100%;
            height: calc(100% - 40px); /* ลดพื้นที่ให้ปุ่ม */
            display: block;
        }
        #back-bar {
            height: 40px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        #back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        #back-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div id="back-bar">
        <button id="back-btn" onclick="window.top.location.href='https://sne-narawadee.github.io/eDS/'">
            &#8592; Back
        </button>
    </div>
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbwCtWZZpeaMIVoSapDpOBXsQSsuLbhjjyFksBWPEv_ZaEROb18p8IWu5RfBLRU_N8tB/exec"
      allow="geolocation"
      credentialless
      referrerpolicy="no-referrer"
      frameborder="0"
      scrolling="no">
    </iframe>
</body>
</html>

<!----- Auto size iframe full screen ----->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#8B0000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>eDS-Checkpoint Report</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: #f8f9fa;
        }
        iframe { border: 0; width: 100%; height: 100%; display: block; }

        /* --- ปุ่มย้อนกลับ (ลอยทับทุกอย่าง) --- */
        #navButtons {
            position: fixed;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
            z-index: 999999; /* สูงที่สุดเพื่อให้ทับหน้า PDF Preview */
        }

        .float-btn {
            background-color: #8B0000; /* แดงเลือดหมู */
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .float-btn:active { transform: scale(0.9); }

        /* ซ่อนปุ่มย้อนกลับในหน้าแรกสุด */
        #backBtn { display: none; }
    </style>
</head>
<body>

    <div id="navButtons">
        <div id="backBtn" class="float-btn" onclick="goBack()">⬅️ ย้อนกลับ</div>
        <a href="https://sne-narawadee.github.io/eDS" target="_top" class="float-btn">🏠 หน้าหลัก</a>
    </div>

    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbxUQZGVqUdMZNfCxXogzw5NPoVyfliZmIxGTOpnMqIjFewwy11axZzWFHj4akMYSJ1X/exec"
      allow="geolocation"
      frameborder="0"
      scrolling="no">
    </iframe>

    <script>
        // เช็กประวัติการเข้าชม: ถ้าไม่ใช่หน้าแรก ให้แสดงปุ่มย้อนกลับ
        window.addEventListener('load', function() {
            if (window.history.length > 1) {
                document.getElementById('backBtn').style.display = 'flex';
            }
        });

        // สำหรับ PWA: แจ้งเตือน Service Worker (ถ้ามี)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // รอรับข้อความจาก Apps Script เมื่อมีการคลิกปุ่มเครื่องพิมพ์
        // ตรวจสอบส่วนนี้ใน <script> ของ GitHub
        window.addEventListener('message', function(event) {
            var newUrl = event.data;
            
            // เช็คว่าข้อมูลที่ส่งมาเป็นลิงก์ Google Drive จริงหรือไม่
            if (typeof newUrl === 'string' && newUrl.indexOf('drive.google.com') !== -1) {
                // 'app' คือ ID ของ iframe ที่คุณตั้งไว้
                var iframe = document.getElementById('app');
                if (iframe) {
                    iframe.src = newUrl;
                    // แสดงปุ่มย้อนกลับเมื่อ PDF เปิดแล้ว
                    document.getElementById('backBtn').style.display = 'flex';
                }
            }
        });
    
        // ปรับฟังก์ชันย้อนกลับให้ฉลาดขึ้น
        function goBack() {
            // ให้ Iframe กลับไปที่หน้าหลักของ Apps Script
            document.getElementById('app').src = "https://script.google.com/macros/s/AKfycbxUQZGVqUdMZNfCxXogzw5NPoVyfliZmIxGTOpnMqIjFewwy11axZzWFHj4akMYSJ1X/exec";
            document.getElementById('backBtn').style.display = 'none';
        }
        
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SNE-eDocument (eDS)</title>

  <!-- PWA Meta -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="description" content="SNE Electronic Document System">

  <!-- Apple iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eDS">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-startup-image" href="icons/splash.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=IBM+Plex+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #1a3a5c;
      --navy-dark: #0f2540;
      --accent: #2a7fd4;
      --accent-light: #5ba3e8;
      --gold: #f0a500;
      --white: #ffffff;
      --bg: #e8eef5;
      --text: #1a3a5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy-dark);
      font-family: 'Sarabun', 'IBM Plex Sans Thai', sans-serif;
    }

    /* ===== SPLASH SCREEN ===== */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(145deg, var(--navy-dark) 0%, var(--navy) 50%, #1e4d7a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #splash.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .splash-logo {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .splash-logo svg { width: 60px; height: 60px; }

    .splash-title {
      text-align: center;
      color: white;
    }

    .splash-title h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .splash-title p {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    .splash-loader {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .splash-loader span {
      width: 8px; height: 8px;
      background: var(--accent-light);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .splash-loader span:nth-child(2) { animation-delay: 0.2s; }
    .splash-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ===== IFRAME ===== */
    #app {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ===== INSTALL BANNER ===== */
    #installBanner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 8888;
      background: linear-gradient(135deg, var(--navy) 0%, var(--accent) 100%);
      color: white;
      padding: 14px 20px;
      border-radius: 60px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      align-items: center;
      gap: 12px;
      width: calc(100% - 40px);
      max-width: 360px;
      justify-content: space-between;
      animation: bannerSlide 0.4s ease forwards;
      backdrop-filter: blur(10px);
    }

    #installBanner.show { display: flex; }

    @keyframes bannerSlide {
      to { transform: translateX(-50%) translateY(0); }
    }

    .install-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .install-text { flex: 1; }
    .install-text strong { display: block; font-size: 14px; font-weight: 600; }
    .install-text span { font-size: 11px; opacity: 0.7; }

    #installBtn {
      background: white;
      color: var(--navy);
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Sarabun', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #installBtn:active { transform: scale(0.95); }

    #closeInstall {
      cursor: pointer;
      opacity: 0.6;
      padding: 4px;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* iOS Install Guide */
    #iosGuide {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8888;
      background: linear-gradient(135deg, var(--navy) 0%, #1e4d7a 100%);
      color: white;
      padding: 16px 20px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      font-size: 13px;
      font-family: 'Sarabun', sans-serif;
      width: calc(100% - 40px);
      max-width: 360px;
      text-align: center;
      line-height: 1.8;
    }

    #iosGuide.show { display: block; }
    #iosGuide .arrow {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid #1e4d7a;
    }

    #iosGuide strong { display: block; margin-bottom: 6px; font-size: 15px; }
    #iosGuide .close-ios {
      margin-top: 10px;
      display: inline-block;
      cursor: pointer;
      opacity: 0.6;
      font-size: 12px;
    }

    /* ===== DARK MODE ===== */
    @media (prefers-color-scheme: dark) {
      html, body { background: #0a1929; }
    }

    /* ===== PC: hide install banner ===== */
    @media (min-width: 1024px) {
      #installBanner, #iosGuide { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Document icon -->
        <rect x="8" y="4" width="36" height="44" rx="4" fill="#1a3a5c"/>
        <rect x="8" y="4" width="36" height="44" rx="4" fill="url(#docGrad)"/>
        <path d="M24 4 L44 4 L44 20 L24 20 Z" fill="#0f2540" opacity="0.3"/>
        <polyline points="24,4 24,20 44,20" fill="none" stroke="#1a3a5c" stroke-width="1.5"/>
        <line x1="14" y1="28" x2="38" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
        <line x1="14" y1="34" x2="38" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="14" y1="40" x2="28" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
        <!-- "e" badge -->
        <circle cx="44" cy="44" r="12" fill="#f0a500"/>
        <text x="44" y="49" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">e</text>
        <defs>
          <linearGradient id="docGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2a7fd4"/>
            <stop offset="100%" stop-color="#1a3a5c"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="splash-title">
      <h1>eDS</h1>
      <p>SNE Electronic Document System</p>
    </div>
    <div class="splash-loader">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Main App -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbxAOQ7FH_k1Z9yIlCzO4XNR_R7uz_ve3KXMD2bhabHMFsSf9E5pMQqlj1ileKvNrG_q/exec"
    allow="geolocation; camera; microphone"
    frameborder="0"
    scrolling="auto">
  </iframe>

  <!-- Android Install Banner -->
  <div id="installBanner">
    <div class="install-icon">
      <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
      </svg>
    </div>
    <div class="install-text">
      <strong>ติดตั้งแอป eDS</strong>
      <span>ใช้งานได้เหมือนแอปมือถือ</span>
    </div>
    <button id="installBtn">ติดตั้ง</button>
    <span id="closeInstall">✕</span>
  </div>

  <!-- iOS Install Guide -->
  <div id="iosGuide">
    <strong>📱 ติดตั้ง eDS บน iPhone/iPad</strong>
    กด <strong>ปุ่ม Share</strong> (□↑) ที่แถบด้านล่าง<br>
    แล้วเลือก <strong>"Add to Home Screen"</strong>
    <div class="close-ios" id="closeIos">ปิด ✕</div>
    <div class="arrow"></div>
  </div>

  <script>
    // ===== Service Worker =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW failed:', err));
      });
    }

    // ===== Splash Screen =====
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('hidden');
        setTimeout(() => {
          document.getElementById('splash').style.display = 'none';
        }, 700);
      }, 2000);
    });

    // ===== Android Install Prompt =====
    let deferredPrompt;
    const banner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');
    const closeInstall = document.getElementById('closeInstall');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isIOS()) banner.classList.add('show');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.remove('show');
    });

    closeInstall.addEventListener('click', () => banner.classList.remove('show'));

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('show');
      deferredPrompt = null;
    });

    // ===== iOS Install Guide =====
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }

    function isInStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    }

    if (isIOS() && !isInStandaloneMode()) {
      setTimeout(() => {
        document.getElementById('iosGuide').classList.add('show');
      }, 3000);
    }

    document.getElementById('closeIos').addEventListener('click', () => {
      document.getElementById('iosGuide').classList.remove('show');
    });
  </script>
</body>
</html>

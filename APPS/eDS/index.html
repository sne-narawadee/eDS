<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SNE-eDocument (eDS)</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a7c4e">
  <meta name="description" content="SNE Electronic Document System">

  <!-- Apple iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eDS">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --g1: #0a7c4e;
      --g2: #06b06a;
      --g3: #00d68f;
      --g-dark: #054d31;
      --g-bg: #e8f7f1;
      --white: #ffffff;
      --text-dark: #0d2e1f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--g-dark);
      font-family: 'Prompt', sans-serif;
    }

    /* =========================================
       SPLASH SCREEN
    ========================================= */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
      background: var(--g-dark);
    }

    /* Animated background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: blobMove 6s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: var(--g2);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: var(--g3);
      bottom: -80px; right: -80px;
      animation-delay: 2s;
    }
    .blob-3 {
      width: 200px; height: 200px;
      background: #00ffb3;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation-delay: 1s;
    }
    @keyframes blobMove {
      0%   { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.2) translate(20px, -20px); }
    }
    .blob-3 { animation: blobMove3 5s ease-in-out infinite alternate; }
    @keyframes blobMove3 {
      0%   { transform: translate(-50%,-50%) scale(1); }
      100% { transform: translate(-40%,-60%) scale(1.3); }
    }

    /* Logo card */
    .splash-card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 56px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      backdrop-filter: blur(20px);
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Logo icon */
    .logo-wrap {
      width: 96px; height: 96px;
      background: linear-gradient(135deg, var(--g2) 0%, var(--g1) 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 8px rgba(6,176,106,0.15),
        0 0 0 16px rgba(6,176,106,0.07),
        0 20px 50px rgba(6,176,106,0.4);
      animation: logoPulse 2.5s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 0 8px rgba(6,176,106,0.15), 0 0 0 16px rgba(6,176,106,0.07), 0 20px 50px rgba(6,176,106,0.4); }
      50%     { box-shadow: 0 0 0 12px rgba(6,176,106,0.2), 0 0 0 24px rgba(6,176,106,0.1), 0 20px 60px rgba(6,176,106,0.5); }
    }

    .logo-wrap svg { width: 58px; height: 58px; }

    /* App name */
    .splash-name {
      text-align: center;
      color: white;
    }
    .splash-name h1 {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, var(--g3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .splash-name p {
      font-size: 12px;
      font-weight: 300;
      opacity: 0.55;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* Custom loading animation — morphing bar */
    .loader-wrap {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .loader-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 99px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--g3), var(--g2));
      border-radius: 99px;
      animation: loaderSlide 1.6s ease-in-out infinite;
      box-shadow: 0 0 12px var(--g3);
    }

    @keyframes loaderSlide {
      0%   { transform: translateX(-100%); width: 40%; }
      50%  { width: 70%; }
      100% { transform: translateX(280%); width: 40%; }
    }

    .loader-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .loader-dots span {
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--g3);
      opacity: 0.3;
      animation: dotPop 1.2s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPop {
      0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
      40%         { transform: scale(1.2); opacity: 1; }
    }

    .loader-text {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1.5px;
      font-weight: 300;
    }

    /* Splash exit */
    #splash.fade-out {
      animation: splashOut 0.7s ease forwards;
    }
    @keyframes splashOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.06); }
    }

    /* =========================================
       IFRAME
    ========================================= */
    #app {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: white;
    }

    /* =========================================
       PAGE LOADING OVERLAY — แสดงระหว่างรอ iframe
    ========================================= */
    #pageLoader {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 5000;
      background: var(--g-dark);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #pageLoader.active {
      display: flex;
    }
    #pageLoader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Spinning ring */
    .pl-ring {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .pl-ring svg {
      width: 80px;
      height: 80px;
      animation: ringRotate 1.4s linear infinite;
    }
    @keyframes ringRotate {
      100% { transform: rotate(360deg); }
    }
    .pl-ring circle {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 160;
      stroke-dashoffset: 120;
      stroke: var(--g3);
      filter: drop-shadow(0 0 6px rgba(0,214,143,0.7));
      animation: ringDash 1.4s ease-in-out infinite;
    }
    @keyframes ringDash {
      0%   { stroke-dashoffset: 150; }
      50%  { stroke-dashoffset: 30; }
      100% { stroke-dashoffset: 150; }
    }

    /* Icon กลาง ring */
    .pl-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pl-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--g3);
      animation: none;
    }

    /* ข้อความสถานะ */
    .pl-texts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .pl-title {
      font-size: 16px;
      font-weight: 600;
      color: white;
      letter-spacing: 1px;
    }
    .pl-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
      letter-spacing: 1.5px;
      transition: opacity 0.2s ease;
      min-height: 18px;
    }

    /* Progress bar */
    .pl-progress {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .pl-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--g3), var(--g2));
      border-radius: 99px;
      box-shadow: 0 0 8px var(--g3);
      transition: width 0.6s ease;
    }

    /* Dots */
    .pl-dots {
      display: flex;
      gap: 6px;
    }
    .pl-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--g3);
      opacity: 0.3;
      animation: dotPop 1.2s ease-in-out infinite;
    }
    .pl-dots span:nth-child(2) { animation-delay: 0.2s; }
    .pl-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* =========================================
       INSTALL BANNER — Android (Popup)
    ========================================= */
    #installBanner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 8888;
      width: calc(100% - 32px);
      max-width: 380px;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g-dark) 100%);
      border: 1px solid rgba(0,214,143,0.25);
      color: white;
      border-radius: 20px;
      padding: 16px 20px;
      align-items: center;
      gap: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
      opacity: 0;
      font-family: 'Prompt', sans-serif;
    }
    #installBanner.show {
      display: flex;
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .install-icon-wrap {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .install-icon-wrap svg {
      width: 24px; height: 24px;
      fill: var(--g3);
    }
    .install-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .install-info strong { font-size: 14px; font-weight: 600; }
    .install-info span   { font-size: 11px; opacity: 0.65; }
    #installBtn {
      background: var(--g3);
      color: var(--text-dark);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Prompt', sans-serif;
      cursor: pointer;
      flex-shrink: 0;
    }
    #closeInstall {
      font-size: 16px;
      opacity: 0.4;
      cursor: pointer;
      flex-shrink: 0;
      padding: 4px;
    }

    /* =========================================
       IOS GUIDE TOOLTIP
    ========================================= */
    #iosGuide {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8888;
      width: calc(100% - 32px);
      max-width: 360px;
      background: linear-gradient(145deg, var(--g1), var(--g-dark));
      border: 1px solid rgba(0,214,143,0.2);
      color: white;
      border-radius: 20px;
      padding: 18px 20px;
      font-family: 'Prompt', sans-serif;
      font-size: 13px;
      line-height: 1.9;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #iosGuide.show { display: block; }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(30px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    #iosGuide .ios-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--g3);
    }

    #iosGuide .ios-step {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 12px;
      margin: 5px 0;
    }

    #iosGuide .step-num {
      width: 22px; height: 22px;
      background: var(--g2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    #closeIos {
      margin-top: 12px;
      display: inline-block;
      cursor: pointer;
      font-size: 12px;
      opacity: 0.5;
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
    }

    /* =========================================
       FLOATING INSTALL BUTTON — มุมขวาล่าง
    ========================================= */
    #fabInstall {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 9000;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--g2) 0%, var(--g1) 100%);
      box-shadow:
        0 4px 20px rgba(6,176,106,0.5),
        0 0 0 0 rgba(6,176,106,0.4);
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: fabPulse 2.5s ease-in-out infinite;
    }
    #fabInstall.visible {
      display: flex;
    }
    #fabInstall:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(6,176,106,0.65);
    }
    #fabInstall:active {
      transform: scale(0.95);
    }
    #fabInstall svg {
      width: 26px;
      height: 26px;
      fill: white;
      pointer-events: none;
    }
    /* Tooltip label ข้างๆ ปุ่ม */
    #fabInstall::before {
      content: attr(data-label);
      position: absolute;
      right: 64px;
      background: rgba(5,77,49,0.92);
      color: white;
      font-family: 'Prompt', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border: 1px solid rgba(0,214,143,0.25);
    }
    #fabInstall:hover::before {
      opacity: 1;
    }
    @keyframes fabPulse {
      0%, 100% {
        box-shadow: 0 4px 20px rgba(6,176,106,0.5), 0 0 0 0 rgba(6,176,106,0.35);
      }
      50% {
        box-shadow: 0 4px 20px rgba(6,176,106,0.5), 0 0 0 10px rgba(6,176,106,0);
      }
    }

    /* สถานะ "เปิดแอป" — เปลี่ยนสี FAB */
    #fabInstall.mode-open {
      background: linear-gradient(135deg, #06b06a 0%, #0a7c4e 100%);
    }
    #fabInstall.mode-open svg {
      /* ไอคอน open/launch */
    }

    /* PC: ซ่อน iOS guide และ banner แต่ยังแสดง FAB */
    @media (min-width: 1024px) {
      #installBanner, #iosGuide { display: none !important; }
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #021a0e; }
    }
  </style>
</head>
<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="splash-card">
      <div class="logo-wrap">
        <svg viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Document body -->
          <rect x="5" y="3" width="34" height="42" rx="5" fill="rgba(255,255,255,0.15)"/>
          <rect x="5" y="3" width="34" height="42" rx="5" fill="url(#dg)"/>
          <!-- Dog-ear fold -->
          <path d="M27 3 L39 3 L39 13 Z" fill="rgba(0,0,0,0.2)"/>
          <path d="M27 3 L27 13 L39 13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
          <!-- Content lines -->
          <rect x="10" y="22" width="22" height="3" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="10" y="29" width="22" height="3" rx="1.5" fill="white" opacity="0.7"/>
          <rect x="10" y="36" width="14" height="3" rx="1.5" fill="white" opacity="0.5"/>
          <!-- Badge -->
          <circle cx="44" cy="44" r="12" fill="url(#gg)" filter="url(#gs)"/>
          <text x="44" y="49.5" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="'Prompt',sans-serif">e</text>
          <defs>
            <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
            </linearGradient>
            <linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00d68f"/>
              <stop offset="100%" stop-color="#06b06a"/>
            </linearGradient>
            <filter id="gs">
              <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00d68f" flood-opacity="0.5"/>
            </filter>
          </defs>
        </svg>
      </div>

      <div class="splash-name">
        <h1>eDS</h1>
        <p>SNE ELECTRONIC DOCUMENT</p>
      </div>

      <div class="loader-wrap">
        <div class="loader-track">
          <div class="loader-bar"></div>
        </div>
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="loader-text" id="loaderText">กำลังโหลด...</span>
      </div>
    </div>
  </div>

  <!-- ===== PAGE LOADING OVERLAY ===== -->
  <div id="pageLoader">
    <div class="pl-ring">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="34"/>
      </svg>
      <div class="pl-icon">
        <!-- Document icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 17h8v1.5H8V17zm0-3h8v1.5H8V14zm0-3h5v1.5H8V11z"/>
        </svg>
      </div>
    </div>

    <div class="pl-texts">
      <div class="pl-title">กำลังเปิดระบบ</div>
      <div class="pl-sub" id="plSubText">กำลังโหลดหน้าแรก...</div>
    </div>

    <div class="pl-progress">
      <div class="pl-progress-bar" id="plBar"></div>
    </div>

    <div class="pl-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ===== MAIN APP IFRAME ===== -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbxAOQ7FH_k1Z9yIlCzO4XNR_R7uz_ve3KXMD2bhabHMFsSf9E5pMQqlj1ileKvNrG_q/exec"
    allow="geolocation; camera; microphone"
    credentialless
    referrerpolicy="no-referrer"
    frameborder="0"
    scrolling="auto">
  </iframe>

  <!-- ===== ANDROID INSTALL BANNER (Popup) ===== -->
  <div id="installBanner">
    <div class="install-icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M17 12l-5 5-5-5h3V7h4v5h3z"/></svg>
    </div>
    <div class="install-info">
      <strong>ติดตั้งแอป eDS</strong>
      <span>เปิดได้เหมือนแอปทั่วไป ไม่ต้องใช้เบราว์เซอร์</span>
    </div>
    <button id="installBtn">ติดตั้ง</button>
    <span id="closeInstall">✕</span>
  </div>

  <!-- ===== iOS INSTALL GUIDE ===== -->
  <div id="iosGuide">
    <div class="ios-title">📲 เพิ่ม eDS ลงหน้าจอหลัก</div>
    <div class="ios-step">
      <div class="step-num">1</div>
      <span>กดปุ่ม <strong>Share</strong> (□↑) ในแถบล่างของ Safari</span>
    </div>
    <div class="ios-step">
      <div class="step-num">2</div>
      <span>เลือก <strong>"Add to Home Screen"</strong></span>
    </div>
    <div class="ios-step">
      <div class="step-num">3</div>
      <span>กด <strong>Add</strong> เพื่อยืนยัน</span>
    </div>
    <span id="closeIos">ปิด ✕</span>
  </div>

  <!-- ===== FLOATING INSTALL / OPEN BUTTON ===== -->
  <button id="fabInstall" data-label="ติดตั้งแอป" aria-label="ติดตั้งแอป eDS">
    <!-- ไอคอน Download (default: ติดตั้ง) -->
    <svg id="fabIconInstall" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
    </svg>
    <!-- ไอคอน Launch (เมื่อติดตั้งแล้ว) -->
    <svg id="fabIconOpen" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
    </svg>
  </button>

  <script>
    // ─── Auto Maximize (PC only) ──────────────
    (function autoMaximizePC() {
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      if (isMobile) return;
      try {
        if (window.outerWidth < screen.availWidth || window.outerHeight < screen.availHeight) {
          window.moveTo(0, 0);
          window.resizeTo(screen.availWidth, screen.availHeight);
        }
      } catch(e) {}
    })();

    // ─── Service Worker ───────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
        .then(() => console.log('[eDS] SW registered'))
        .catch(err => console.log('[eDS] SW failed:', err));
      });
    }

    // ─── Loading text cycle ───────────────────
    const loadTexts = ['กำลังโหลด...', 'เชื่อมต่อระบบ...', 'เตรียมข้อมูล...', 'พร้อมใช้งาน ✓'];
    let ti = 0;
    const lt = document.getElementById('loaderText');
    const textInterval = setInterval(() => {
      ti = (ti + 1) % loadTexts.length;
      lt.style.opacity = '0';
      setTimeout(() => { lt.textContent = loadTexts[ti]; lt.style.opacity = '1'; }, 200);
    }, 700);

    // ─── Page Loader (แสดงระหว่างรอ iframe) ──
    const pageLoader  = document.getElementById('pageLoader');
    const plBar       = document.getElementById('plBar');
    const plSubText   = document.getElementById('plSubText');
    let plProgress    = 0;
    let plInterval    = null;
    let iframeLoaded  = false;

    const plMessages  = [
      'กำลังโหลดหน้าแรก...',
      'เชื่อมต่อเซิร์ฟเวอร์...',
      'กำลังตรวจสอบสิทธิ์...',
      'เตรียมข้อมูลผู้ใช้...',
      'โหลดเนื้อหาเกือบเสร็จแล้ว...',
    ];
    let plMsgIdx = 0;

    function startPageLoader() {
      if (iframeLoaded) return;
      pageLoader.classList.add('active');
      plProgress = 5;
      plBar.style.width = plProgress + '%';
      plSubText.textContent = plMessages[0];

      plInterval = setInterval(() => {
        if (iframeLoaded) { clearInterval(plInterval); return; }

        // เพิ่ม progress แบบ ease — เร็วตอนต้น ช้าตอนท้าย
        const remaining = 90 - plProgress;
        plProgress += Math.max(0.5, remaining * 0.06);
        if (plProgress > 90) plProgress = 90;
        plBar.style.width = plProgress + '%';

        // หมุนข้อความ
        const nextIdx = Math.min(Math.floor(plProgress / 20), plMessages.length - 1);
        if (nextIdx !== plMsgIdx) {
          plMsgIdx = nextIdx;
          plSubText.style.opacity = '0';
          setTimeout(() => {
            plSubText.textContent = plMessages[plMsgIdx];
            plSubText.style.opacity = '1';
          }, 200);
        }
      }, 400);
    }

    function finishPageLoader() {
      if (iframeLoaded) return;
      iframeLoaded = true;
      clearInterval(plInterval);
      plProgress = 100;
      plBar.style.width = '100%';
      plSubText.style.opacity = '0';
      setTimeout(() => {
        plSubText.textContent = 'พร้อมใช้งาน ✓';
        plSubText.style.opacity = '1';
      }, 200);
      setTimeout(() => {
        pageLoader.classList.add('fade-out');
        setTimeout(() => pageLoader.classList.remove('active'), 600);
      }, 500);
    }

    // ─── Splash dismiss ───────────────────────
    const splash = document.getElementById('splash');
    function hideSplash() {
      clearInterval(textInterval);
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.style.display = 'none';
        // แสดง pageLoader ต่อทันที ถ้า iframe ยังไม่โหลดเสร็จ
        if (!iframeLoaded) startPageLoader();
      }, 750);
    }

    const splashTimer = setTimeout(hideSplash, 2500);
    document.getElementById('app').addEventListener('load', () => {
      clearTimeout(splashTimer);
      if (!splash.classList.contains('fade-out')) {
        // iframe โหลดเสร็จก่อน splash หาย → ปิด splash ตามปกติ ไม่ต้อง pageLoader
        iframeLoaded = true;
        setTimeout(hideSplash, 600);
      } else {
        // iframe โหลดเสร็จหลัง splash หาย → ปิด pageLoader
        finishPageLoader();
      }
    });

    // ─── Helpers ─────────────────────────────
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }
    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches
          || navigator.standalone === true;
    }

    // ─── FAB Element ─────────────────────────
    const fab           = document.getElementById('fabInstall');
    const fabIconInstall = document.getElementById('fabIconInstall');
    const fabIconOpen    = document.getElementById('fabIconOpen');

    /**
     * setFabMode('install') — แสดงปุ่มติดตั้ง
     * setFabMode('open')    — แสดงปุ่มเปิดแอป
     * setFabMode('hidden')  — ซ่อนปุ่ม
     */
    function setFabMode(mode) {
      fab.classList.remove('visible', 'mode-open');
      if (mode === 'hidden') return;

      fab.classList.add('visible');
      if (mode === 'open') {
        fab.classList.add('mode-open');
        fab.setAttribute('data-label', 'เปิดแอป');
        fab.setAttribute('aria-label', 'เปิดแอป eDS');
        fabIconInstall.style.display = 'none';
        fabIconOpen.style.display    = 'block';
      } else {
        fab.setAttribute('data-label', 'ติดตั้งแอป');
        fab.setAttribute('aria-label', 'ติดตั้งแอป eDS');
        fabIconInstall.style.display = 'block';
        fabIconOpen.style.display    = 'none';
      }
    }

    /**
     * ตรวจสอบว่าแอปถูกติดตั้งแล้วหรือยัง
     *
     * วิธีตรวจ:
     * 1. display-mode: standalone  → แอปถูก launch จาก Home Screen แล้ว
     * 2. getInstalledRelatedApps() → API ของ Chrome ตรวจสอบว่า PWA ถูก install
     * 3. localStorage flag         → เก็บสถานะหลัง appinstalled event
     */
    async function checkInstallStatus() {
      // กรณีรันอยู่ใน standalone mode = ติดตั้งแล้วและกำลังเปิดแอปอยู่
      if (isStandalone()) {
        setFabMode('hidden'); // ซ่อนปุ่มเมื่ออยู่ใน app mode
        return;
      }

      // ตรวจสอบ localStorage flag (บันทึกไว้หลัง install สำเร็จ)
      const installedFlag = localStorage.getItem('eDS_installed');

      // ตรวจสอบผ่าน getInstalledRelatedApps (Chrome/Android)
      let relatedAppInstalled = false;
      if ('getInstalledRelatedApps' in navigator) {
        try {
          const apps = await navigator.getInstalledRelatedApps();
          relatedAppInstalled = apps.length > 0;
        } catch(e) {}
      }

      if (installedFlag === 'true' || relatedAppInstalled) {
        // ติดตั้งแล้ว
        if (isAndroid() && !isIOS()) {
          // Android: พยายาม launch PWA (browser จะ intercept)
          try {
            const launched = window.open(window.location.href, '_blank');
            if (!launched || launched.closed || typeof launched.closed === 'undefined') {
              setFabMode('open'); // fallback แสดงปุ่ม
            } else {
              setFabMode('hidden'); // เปิดอัตโนมัติแล้ว
            }
          } catch(e) {
            setFabMode('open');
          }
        } else {
          // Desktop / iOS: ซ่อนปุ่มเงียบๆ (ไม่ auto-open เพราะ popup block)
          setFabMode('hidden');
        }
      } else {
        // ยังไม่ได้ติดตั้ง → ซ่อนก่อน รอ beforeinstallprompt หรือ iOS
        // (จะแสดงเมื่อพร้อม)
        setFabMode('hidden');
      }
    }

    // รันตรวจสอบตอนโหลด
    checkInstallStatus();

    // ─── Android / Desktop Install ───────────
    let deferredPrompt = null;
    const banner       = document.getElementById('installBanner');
    const installBtn   = document.getElementById('installBtn');
    const closeInstall = document.getElementById('closeInstall');

    /**
     * beforeinstallprompt — browser ยิง event นี้เมื่อ PWA "installable"
     * Chrome Desktop อาจยิงแม้ยังมีแอปติดตั้งอยู่
     * → verify สถานะจริงก่อนตัดสินใจแสดงปุ่ม
     */
    window.addEventListener('beforeinstallprompt', async (e) => {
      e.preventDefault();
      deferredPrompt = e;

      if (isIOS()) return;
      if (isStandalone()) return;

      const installedFlag = localStorage.getItem('eDS_installed') === 'true';

      if (installedFlag) {
        // verify ผ่าน getInstalledRelatedApps ก่อน
        let stillInstalled = false;
        if ('getInstalledRelatedApps' in navigator) {
          try {
            const apps = await navigator.getInstalledRelatedApps();
            stillInstalled = apps.length > 0;
          } catch(e2) {}
        }

        if (stillInstalled) {
          // ยังติดตั้งอยู่จริง → ซ่อนปุ่ม
          console.log('[eDS] PWA still installed → hiding FAB');
          setFabMode('hidden');
          return;
        } else {
          // ถอนการติดตั้งแล้ว → ล้าง flag
          console.log('[eDS] Detected uninstall → resetting install state');
          localStorage.removeItem('eDS_installed');
        }
      }

      // ยังไม่ได้ติดตั้ง (หรือถอนออกแล้ว) → แสดงปุ่มติดตั้ง
      setFabMode('install');

      if (isAndroid()) {
        setTimeout(() => banner.classList.add('show'), 1200);
      }
    });

    // ─── ฟังก์ชันติดตั้ง (Android/Desktop) ──
    async function triggerInstall() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (outcome === 'accepted') {
        localStorage.setItem('eDS_installed', 'true');
        setFabMode('hidden'); // ซ่อนปุ่มเพราะแอปเปิดเองอัตโนมัติ
      }
    }

    // ─── appinstalled event ──────────────────
    window.addEventListener('appinstalled', () => {
      banner.classList.remove('show');
      deferredPrompt = null;
      localStorage.setItem('eDS_installed', 'true');
      setFabMode('hidden'); // ซ่อนปุ่มเพราะแอปเปิดเองอัตโนมัติหลังติดตั้ง
      console.log('[eDS] App installed successfully');
    });

    // คลิกปุ่ม ติดตั้ง ใน Banner
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      await triggerInstall();
      banner.classList.remove('show');
    });
    closeInstall.addEventListener('click', () => banner.classList.remove('show'));

    // ─── FAB Click ────────────────────────────
    fab.addEventListener('click', async () => {
      const isOpenMode = fab.classList.contains('mode-open');

      if (isOpenMode) {
        // เปิดแอปที่ติดตั้งไว้แล้ว
        // Chrome/Android จะ intercept window.open และเปิด PWA window แทน browser
        try {
          window.open(window.location.href, '_blank');
        } catch(e) {
          window.location.reload();
        }
      } else if (deferredPrompt) {
        // Android/Desktop: แสดง install prompt
        await triggerInstall();
        banner.classList.remove('show');
      } else if (isIOS()) {
        // iOS: แสดงคู่มือ Add to Home Screen
        document.getElementById('iosGuide').classList.add('show');
      }
    });

    // ─── iOS Guide ────────────────────────────
    if (isIOS() && !isStandalone()) {
      setTimeout(() => {
        setFabMode('install');
        setTimeout(() => document.getElementById('iosGuide').classList.add('show'), 3500);
      }, 1000);
    }

    document.getElementById('closeIos').addEventListener('click', () => {
      document.getElementById('iosGuide').classList.remove('show');
    });

  </script>
</body>
</html>

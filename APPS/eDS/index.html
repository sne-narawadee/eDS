<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>SNE-eDocument (eDS)</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a7c4e">
  <meta name="description" content="SNE Electronic Document System">

  <!-- Apple iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eDS">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --g1: #0a7c4e;
      --g2: #06b06a;
      --g3: #00d68f;
      --g-dark: #054d31;
      --g-bg: #e8f7f1;
      --white: #ffffff;
      --text-dark: #0d2e1f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--g-dark);
      font-family: 'Prompt', sans-serif;
    }

    /* =========================================
       SPLASH SCREEN
    ========================================= */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
      background: var(--g-dark);
    }

    /* Animated background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: blobMove 6s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: var(--g2);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: var(--g3);
      bottom: -80px; right: -80px;
      animation-delay: 2s;
    }
    .blob-3 {
      width: 200px; height: 200px;
      background: #00ffb3;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation-delay: 1s;
    }
    @keyframes blobMove {
      0%   { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.2) translate(20px, -20px); }
    }
    .blob-3 { animation: blobMove3 5s ease-in-out infinite alternate; }
    @keyframes blobMove3 {
      0%   { transform: translate(-50%,-50%) scale(1); }
      100% { transform: translate(-40%,-60%) scale(1.3); }
    }

    /* Logo card */
    .splash-card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 56px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      backdrop-filter: blur(20px);
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.7) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Logo icon */
    .logo-wrap {
      width: 96px; height: 96px;
      background: linear-gradient(135deg, var(--g2) 0%, var(--g1) 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 8px rgba(6,176,106,0.15),
        0 0 0 16px rgba(6,176,106,0.07),
        0 20px 50px rgba(6,176,106,0.4);
      animation: logoPulse 2.5s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 0 8px rgba(6,176,106,0.15), 0 0 0 16px rgba(6,176,106,0.07), 0 20px 50px rgba(6,176,106,0.4); }
      50%     { box-shadow: 0 0 0 12px rgba(6,176,106,0.2), 0 0 0 24px rgba(6,176,106,0.1), 0 20px 60px rgba(6,176,106,0.5); }
    }

    .logo-wrap svg { width: 58px; height: 58px; }

    /* App name */
    .splash-name {
      text-align: center;
      color: white;
    }
    .splash-name h1 {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, var(--g3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .splash-name p {
      font-size: 12px;
      font-weight: 300;
      opacity: 0.55;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* Custom loading animation — morphing bar */
    .loader-wrap {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .loader-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 99px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--g3), var(--g2));
      border-radius: 99px;
      animation: loaderSlide 1.6s ease-in-out infinite;
      box-shadow: 0 0 12px var(--g3);
    }

    @keyframes loaderSlide {
      0%   { transform: translateX(-100%); width: 40%; }
      50%  { width: 70%; }
      100% { transform: translateX(280%); width: 40%; }
    }

    .loader-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .loader-dots span {
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--g3);
      opacity: 0.3;
      animation: dotPop 1.2s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPop {
      0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
      40%         { transform: scale(1.2); opacity: 1; }
    }

    .loader-text {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1.5px;
      font-weight: 300;
    }

    /* Splash exit */
    #splash.fade-out {
      animation: splashOut 0.7s ease forwards;
    }
    @keyframes splashOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.06); }
    }

    /* =========================================
       IFRAME
    ========================================= */
	#app {
	  position: fixed;
	  top: 0; left: 0;
	  width: 100vw;
	  height: 100vh;
	  border: 0;
	  display: block;
	  background: white;
	}

    /* =========================================
       INSTALL BANNER — Android
    ========================================= */
    #installBanner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 8888;
      width: calc(100% - 32px);
      max-width: 380px;
      background: linear-gradient(135deg, var(--g1) 0%, var(--g-dark) 100%);
      border: 1px solid rgba(0,214,143,0.25);
      color: white;
      border-radius: 20px;
      padding: 14px 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
      font-family: 'Prompt', sans-serif;
      backdrop-filter: blur(16px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
      opacity: 0;
    }

    #installBanner.show {
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .install-icon-wrap {
      width: 44px; height: 44px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--g2), var(--g3));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,214,143,0.4);
    }

    .install-icon-wrap svg { width: 24px; height: 24px; fill: white; }

    .install-info { flex: 1; min-width: 0; }
    .install-info strong { display: block; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .install-info span { font-size: 11px; opacity: 0.6; font-weight: 300; }

    #installBtn {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--g3), var(--g2));
      color: var(--g-dark);
      border: none;
      padding: 9px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Prompt', sans-serif;
      box-shadow: 0 4px 14px rgba(0,214,143,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #installBtn:active { transform: scale(0.93); box-shadow: none; }

    #closeInstall {
      flex-shrink: 0;
      cursor: pointer;
      opacity: 0.45;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      transition: opacity 0.2s;
    }
    #closeInstall:hover { opacity: 0.8; }

    /* =========================================
       IOS GUIDE TOOLTIP
    ========================================= */
    #iosGuide {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8888;
      width: calc(100% - 32px);
      max-width: 360px;
      background: linear-gradient(145deg, var(--g1), var(--g-dark));
      border: 1px solid rgba(0,214,143,0.2);
      color: white;
      border-radius: 20px;
      padding: 18px 20px;
      font-family: 'Prompt', sans-serif;
      font-size: 13px;
      line-height: 1.9;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #iosGuide.show { display: block; }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(30px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    #iosGuide .ios-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--g3);
    }

    #iosGuide .ios-step {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 12px;
      margin: 5px 0;
    }

    #iosGuide .step-num {
      width: 22px; height: 22px;
      background: var(--g2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    #closeIos {
      margin-top: 12px;
      display: inline-block;
      cursor: pointer;
      font-size: 12px;
      opacity: 0.5;
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #021a0e; }
    }
  </style>
</head>
<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="splash-card">
      <div class="logo-wrap">
        <svg viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Document body -->
          <rect x="5" y="3" width="34" height="42" rx="5" fill="rgba(255,255,255,0.15)"/>
          <rect x="5" y="3" width="34" height="42" rx="5" fill="url(#dg)"/>
          <!-- Dog-ear fold -->
          <path d="M27 3 L39 3 L39 13 Z" fill="rgba(0,0,0,0.2)"/>
          <path d="M27 3 L27 13 L39 13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
          <!-- Content lines -->
          <rect x="10" y="22" width="22" height="3" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="10" y="29" width="22" height="3" rx="1.5" fill="white" opacity="0.7"/>
          <rect x="10" y="36" width="14" height="3" rx="1.5" fill="white" opacity="0.5"/>
          <!-- Badge -->
          <circle cx="44" cy="44" r="12" fill="url(#gg)" filter="url(#gs)"/>
          <text x="44" y="49.5" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="'Prompt',sans-serif">e</text>
          <defs>
            <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
            </linearGradient>
            <linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00d68f"/>
              <stop offset="100%" stop-color="#06b06a"/>
            </linearGradient>
            <filter id="gs">
              <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00d68f" flood-opacity="0.5"/>
            </filter>
          </defs>
        </svg>
      </div>

      <div class="splash-name">
        <h1>eDS</h1>
        <p>SNE ELECTRONIC DOCUMENT</p>
      </div>

      <div class="loader-wrap">
        <div class="loader-track">
          <div class="loader-bar"></div>
        </div>
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="loader-text" id="loaderText">กำลังโหลด...</span>
      </div>
    </div>
  </div>

  <!-- ===== MAIN APP IFRAME ===== -->
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbxAOQ7FH_k1Z9yIlCzO4XNR_R7uz_ve3KXMD2bhabHMFsSf9E5pMQqlj1ileKvNrG_q/exec"
    allow="geolocation; camera; microphone"
    frameborder="0"
    scrolling="auto">
  </iframe>

  <!-- ===== ANDROID INSTALL BANNER ===== -->
  <div id="installBanner">
    <div class="install-icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14H11V8h2v8zm0-10H11V4h2v2z"/><path d="M17 12l-5 5-5-5h3V7h4v5h3z"/></svg>
    </div>
    <div class="install-info">
      <strong>ติดตั้งแอป eDS</strong>
      <span>เปิดได้เหมือนแอปทั่วไป ไม่ต้องใช้เบราว์เซอร์</span>
    </div>
    <button id="installBtn">ติดตั้ง</button>
    <span id="closeInstall">✕</span>
  </div>

  <!-- ===== iOS INSTALL GUIDE ===== -->
  <div id="iosGuide">
    <div class="ios-title">📲 เพิ่ม eDS ลงหน้าจอหลัก</div>
    <div class="ios-step">
      <div class="step-num">1</div>
      <span>กดปุ่ม <strong>Share</strong> (□↑) ในแถบล่างของ Safari</span>
    </div>
    <div class="ios-step">
      <div class="step-num">2</div>
      <span>เลือก <strong>"Add to Home Screen"</strong></span>
    </div>
    <div class="ios-step">
      <div class="step-num">3</div>
      <span>กด <strong>Add</strong> เพื่อยืนยัน</span>
    </div>
    <span id="closeIos">ปิด ✕</span>
  </div>

  <script>
	  
	// Auto maximize เมื่อเปิดแอป
	if (window.matchMedia('(display-mode: standalone)').matches ||
	    window.matchMedia('(display-mode: fullscreen)').matches) {
	  try {
	    window.moveTo(0, 0);
	    window.resizeTo(screen.availWidth, screen.availHeight);
	  } catch(e) {}
	}	  
	  
    // ─── Service Worker ───────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('[eDS] SW registered'))
          .catch(err => console.log('[eDS] SW failed:', err));
      });
    }

    // ─── Loading text cycle ───────────────────
    const loadTexts = ['กำลังโหลด...', 'เชื่อมต่อระบบ...', 'เตรียมข้อมูล...', 'พร้อมใช้งาน ✓'];
    let ti = 0;
    const lt = document.getElementById('loaderText');
    const textInterval = setInterval(() => {
      ti = (ti + 1) % loadTexts.length;
      lt.style.opacity = '0';
      setTimeout(() => { lt.textContent = loadTexts[ti]; lt.style.opacity = '1'; }, 200);
    }, 700);

    // ─── Splash dismiss ───────────────────────
    const splash = document.getElementById('splash');
    function hideSplash() {
      clearInterval(textInterval);
      splash.classList.add('fade-out');
      setTimeout(() => splash.style.display = 'none', 750);
    }

    // Dismiss after 2.5s OR when iframe loads
    const splashTimer = setTimeout(hideSplash, 2500);
    document.getElementById('app').addEventListener('load', () => {
      clearTimeout(splashTimer);
      setTimeout(hideSplash, 600); // brief pause so app renders
    });

    // ─── Android Install Prompt ───────────────
    let deferredPrompt;
    const banner   = document.getElementById('installBanner');
    const installBtn  = document.getElementById('installBtn');
    const closeInstall = document.getElementById('closeInstall');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isIOS()) {
        setTimeout(() => banner.classList.add('show'), 1200);
      }
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.remove('show');
    });

    closeInstall.addEventListener('click', () => banner.classList.remove('show'));

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('show');
      deferredPrompt = null;
    });

    // ─── iOS Guide ────────────────────────────
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    }

    if (isIOS() && !isStandalone()) {
      setTimeout(() => document.getElementById('iosGuide').classList.add('show'), 3500);
    }
    document.getElementById('closeIos').addEventListener('click', () => {
      document.getElementById('iosGuide').classList.remove('show');
    });
  </script>
</body>
</html>

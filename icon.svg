<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="100" ry="100" fill="url(#shine)"/>

  <!-- Document icon shape -->
  <rect x="130" y="80" width="200" height="260" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="8"/>
  <rect x="138" y="88" width="184" height="244" rx="10" ry="10" fill="rgba(255,255,255,0.08)"/>
  <!-- Document lines -->
  <rect x="162" y="140" width="136" height="10" rx="5" fill="rgba(255,255,255,0.4)"/>
  <rect x="162" y="168" width="100" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="162" y="196" width="120" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
  <rect x="162" y="224" width="80" height="10"  rx="5" fill="rgba(255,255,255,0.2)"/>

  <!-- "eDS" text -->
  <text x="256" y="430"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="130"
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="-4">eDS</text>

  <!-- Bottom accent line -->
  <rect x="130" y="458" width="252" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
</svg>
